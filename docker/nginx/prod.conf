# 1. HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name your-domain.com; # 본인의 도메인으로 수정

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS 설정
server {
    listen 443 ssl;
    server_name your-domain.com;

    # 인증서 경로 (docker-compose에서 볼륨으로 연결해줘야 함)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 보안 최적화 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 프론트엔드 (Next.js 컨테이너)
    location / {
        proxy_pass http://prod-next-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API (Spring Boot 컨테이너)
    location /api {
        proxy_pass http://prod-spring-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 모니터링 경로는 외부 노출 방지를 위해 특정 IP나 추가 인증을 거는 것이 좋습니다.
}