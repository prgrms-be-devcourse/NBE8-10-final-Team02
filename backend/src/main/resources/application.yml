spring:
  application:
    name: backend
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s
  cache:
    type: caffeine

  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${GITHUB_CLIENT_ID:GITHUB_CLIENT_ID}
            clientSecret: ${GITHUB_CLIENT_SECRET:GITHUB_CLIENT_SECRET}
            scope: user:email,read:user
          google:
            clientId: ${GOOGLE_CLIENT_ID:GOOGLE_CLIENT_ID}
            clientSecret: ${GOOGLE_CLIENT_SECRET:GOOGLE_CLIENT_SECRET}
            scope: profile,email
          kakao:
            clientId: ${KAKAO_CLIENT_ID:KAKAO_CLIENT_ID}
            scope: profile_nickname, profile_image
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: '{baseUrl}/{action}/oauth2/code/{registrationId}'
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: ${document.upload.max-file-size-mb}MB
      max-request-size: ${document.upload.max-file-size-mb}MB

# Actuator 설정 (Prometheus 수집을 위해 필수)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: spring-app # Prometheus 설정의 job_name과 맞춰주는 것이 좋습니다.

app:
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:uploads}
  ocr:
    # Tesseract OCR 활성화 여부. true로 설정하면 스캔 PDF에서 텍스트를 추출한다.
    # 런타임에 Tesseract 5.x 네이티브 라이브러리 및 tessdata가 필요하다 (Dockerfile 참고).
    # 로컬 개발 환경에서는 Tesseract 미설치 시 false로 유지한다.
    enabled: ${APP_OCR_ENABLED:false}
    # tessdata 디렉토리 경로. 비어 있으면 Tesseract 기본 경로를 사용한다.
    tesseract-data-path: ${APP_OCR_TESSDATA_PATH:}
    # OCR 언어 코드. 복수 언어는 '+'로 구분 (예: eng+kor)
    language: ${APP_OCR_LANGUAGE:eng+kor}

ai:
  provider: gemini
  fallback-provider: gemini  # 글로벌 fallback을 Gemini AI Studio(무료)로 변경 — GROQ 템플릿 실패 시 다른 provider로 가야 함
  concurrency:
    max-concurrent-calls: 4      # 2 vCPU × 2 — I/O-bound AI 호출의 적정 동시성
    queue-timeout-seconds: 180   # 대기 한도 (AI 응답 120s + 큐 대기 60s)
  rate-limit:
    gemini:
      rpm: 10
      rpd: 250
      tpm: 250000
      # tpd 미설정 → 일간 토큰 체크 비활성화
    groq:
      rpm: 30
      rpd: 1000
      tpm: 12000
      tpd: 100000
    vertex-ai:
      rpm: 60
      rpd: 10000
      tpm: 1000000
  vertex-ai:
    project-id: ${VERTEX_AI_PROJECT_ID:}
    location: ${VERTEX_AI_LOCATION:us-central1}
    model: gemini-2.5-flash
    credentials-path: ${VERTEX_AI_CREDENTIALS_PATH:}
    timeout:
      connect: 5s
      read: 120s
    retry:
      max-attempts: 1
  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash
    timeout:
      connect: 5s
      read: 60s
    retry:
      max-attempts: 1
  groq:
    api-key: ${GROQ_API_KEY}
    base-url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    timeout:
      connect: 5s
      read: 60s
    retry:
      max-attempts: 1

document:
  upload:
    # 업로드 허용 최대 파일 크기 (MB). spring.servlet.multipart 제한과 동기화됨.
    max-file-size-mb: 50
    # 사용자 1명이 보유할 수 있는 최대 문서 수.
    max-document-count: 5

analysis:
  # OCI 파일시스템의 repo clone 베이스 경로 (/data/repos/{userId}/{repoId}/)
  repo-base-path: /data/repos
  # 외부 언어 분석기 스크립트 디렉토리 경로 (배포 시 절대 경로로 지정)
  scripts-base-path: /opt/analysis-scripts
  file-filter:
    # repo 파일 단일 크기 상한 (기본 1MB). 초과 파일은 스킵.
    max-file-size-bytes: 1048576

# JWT 보안 설정
security:
  gitleaks:
    # gitleaks 바이너리 경로 (PATH에 있으면 이름만 지정)
    binary-path: gitleaks
    # 스캔 타임아웃 (초). 초과 시 스캔 스킵 후 분석 계속.
    timeout-seconds: 60
    # false로 설정하면 스캔 없이 통과 (로컬 개발 환경 등 gitleaks 미설치 시)
    enabled: true
  jwt:
    # 개발용 기본 시크릿 (운영에서는 반드시 환경변수로 변경 필요!)
    secret: dev-jwt-secret-key-change-in-production-f8e7d6c5b4a39281706958473625140a
    access-ttl-seconds: 900 # 15분
    refresh-ttl-seconds: 86400 # 24시간
  cookie:
    secure: false # 개발 환경 기본값, HTTPS 환경에서는 true로 설정
  oauth2:
    frontend-redirect-url: http://localhost:3000

knowledge:
  github:
    token: ${KNOWLEDGE_GITHUB_TOKEN}

github:
  collection:
    # GraphQL first 값 — GitHub API 최대치 활용
    page-size: 100
    # Hard Cap: 2년 이내라도 극단적으로 많은 PR/Issue 방어 (PR/Issue 각각 독립 적용)
    max-fetch: 300
    # 수집 기간: today - N일. contributionsCollection 기간과 통일.
    since-days: 730
  metadata:
    rate-limit:
      # GraphQL node cost 기준 최소 잔량 — 이하면 수집 중단
      graphql-minimum-remaining: 500
      # REST 최소 잔량
      rest-minimum-remaining: 100
      # GET /rate_limit 응답 Redis 캐시 TTL (초)
      check-cache-ttl-seconds: 60
    # GitHub Activity 섹션 토큰 예산 (1 token ≈ 4 chars)
    token-budget: 1500
    # PR/Issue 각각 Impact Score 상위 N개 선정
    top-n: 5
