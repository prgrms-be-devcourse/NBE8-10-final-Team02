spring:
  application:
    name: backend
  profiles:
    active: dev

# Actuator 설정 (Prometheus 수집을 위해 필수)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: spring-app # Prometheus 설정의 job_name과 맞춰주는 것이 좋습니다.

ai:
  provider: gemini
  gemini:
    api-key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash
    timeout:
      connect: 5s
      read: 60s
    retry:
      max-attempts: 1
