spring:
  config:
    import:
      - optional:file:.env.test[.properties]      # working dir = 프로젝트 루트일 때
      - optional:file:../.env.test[.properties]   # working dir = backend/ 일 때 (CI)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true

  # CI(GitHub Actions)에서는 test.yml의 services.redis가 localhost:6379로 Redis를 실행함.
  # 로컬에서는 Docker로 띄운 Redis가 동일 포트에서 실행 중이어야 함.
  data:
    redis:
      host: localhost
      port: 6379

  # github는 redirectionUrl 하나밖에 지원을 안하기 때문에 LOCAL ID,SECRET이 따로 필요
  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${GITHUB_CLIENT_ID_LOCAL:test-github-client-id}
            clientSecret: ${GITHUB_CLIENT_SECRET_LOCAL:test-github-client-secret}
          google:
            clientId: ${GOOGLE_CLIENT_ID:test-google-client-id}
            clientSecret: ${GOOGLE_CLIENT_SECRET:test-google-client-secret}
          kakao:
            clientId: ${KAKAO_CLIENT_ID:test-kakao-client-id}

app:
  storage:
    upload-dir: /tmp/test-uploads #파일업로드 위치

ai:
  fallback-provider: # 테스트 환경에서는 fallback 비활성화
  gemini:
    api-key: test-key-not-real
    base-url: http://localhost:8089  # WireMock이 @DynamicPropertySource로 덮어씀
    model: gemini-2.5-flash
    timeout:
      connect: 1s
      read: 5s # 빠른 실패
    retry:
      max-attempts: 0 # 재시도 비활성화
  groq:
    api-key: test-key-not-real
    base-url: http://localhost:8089  # WireMock이 @DynamicPropertySource로 덮어씀
    model: llama-3.3-70b-versatile
    timeout:
      connect: 1s
      read: 5s
    retry:
      max-attempts: 0

security:
  jwt:
    secret: test-jwt-secret-key-for-integration-tests-9f8e7d6c5b4a3928
    access-ttl-seconds: 60 # 테스트 환경에서는 1분으로 짧게
    refresh-ttl-seconds: 120 # 2분
  cookie:
    secure: false # 테스트 환경

knowledge:
  github:
    token: ${KNOWLEDGE_GITHUB_TOKEN:KNOWLEDGE_GITHUB_TOKEN}
