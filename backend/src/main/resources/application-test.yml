spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
  # 팀에서 Redis 미사용으로 결정했으나, Redis 설정을 추가한 브랜치가 머지될 경우
  # PlaceholderResolutionException 방지용 더미값
  data:
    redis:
      host: localhost
      port: 6379

ai:
  gemini:
    api-key: test-key-not-real
    base-url: http://localhost:8089 # MockWebServer 주소
    model: gemini-2.5-flash
    timeout:
      connect: 1s
      read: 5s # 빠른 실패
    retry:
      max-attempts: 0 # 재시도 비활성화

security:
  jwt:
    secret: test-jwt-secret-key-for-integration-tests-9f8e7d6c5b4a3928 #tests-only-not-real
    access-ttl-seconds: 900
    refresh-ttl-seconds: 86400
  cookie:
    secure: false
