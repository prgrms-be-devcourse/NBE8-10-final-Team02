followup:
  version: v0.2-locked-min
  runtime:
    inputMode: QUESTION_TYPE_PLUS_ANSWER_TEXT
    useQuestionTypeFallbackOnlyWhenMissing: true
    maxCandidateQuestionTypes: 2
    strictDynamicMode: true

  questionTypeFallback:
    PROJECT: ["프로젝트", "기여", "역할", "소개", "참여"]
    PROBLEM: ["문제", "이슈", "장애", "원인", "해결", "트러블슈팅"]
    TECH: ["왜", "선택", "대안", "비교", "트레이드오프", "설계"]
    COLLABORATION: ["협업", "갈등", "조율", "의견 차이", "다른 직군", "코드 리뷰"]

  signals:
    ROLE:
      - '(저는|제가).{0,45}(맡은|맡았|맡아서|맡아|담당했|주도했)'
      - '프로젝트.{0,12}(맡은 적이 있|맡았습니다|맡아서|맡아|주도했습니다)'
      - '(백엔드|서버|프론트|인프라|운영|데이터|배포).{0,20}(담당|역할)'
      - '주로.{0,20}(맡았|담당했)'
    ACTION:
      - '(제가|저는).{0,40}(설계|구현|개선|적용|도입|수정|분리|추가|정리|작성|제안|구성|연동|고정|관리|전환|재구성|재설계|만들|바꾸|바꿨|손봤|맞췄)'
      - '(로직|구조|쿼리|배치|API|기능|문서|정책|기준|흐름|상태 머신|스케줄러|인덱스|캐시|이력|테이블|조건문|테스트|정의|컬럼).{0,20}(설계|구현|개선|적용|도입|수정|분리|추가|정리|작성|제안|구성|고정|관리|전환|만들|바꾸|바꿨|손봤|맞췄)'
      - '(설계|구현|개선|적용|도입|수정|분리|추가|정리|작성|제안|구성|고정|관리|전환|재구성|재설계|바꿨)(했|하여|해서|했고|했습니다)?'
      - '(인덱스|정렬 기준|검색 조건|우선순위).{0,25}(우회하|조정했)'
      - '(변경 포인트|영향 범위|리뷰 기준).{0,20}(설명|정리|확인|공유|제안)'
      - '(문서로).{0,20}(남기|정리)'
      - '(회의를|회의를 짧게).{0,20}(잡았|잡았습니다)'
      - '(이야기하면서|논의하면서).{0,20}(진행했|진행했습니다)'
    RESULT:
      - '(출시|적용|배포|도입|변경|이후|후).{0,40}(줄었|줄어들었|개선됐|개선되었|향상됐|향상되었|증가했|감소했|안정화됐|빨라졌|사라졌|쉬워졌|올라갔|낮아졌|내려갔)(습니다|고)'
      - '(평균|응답 시간|조회 시간|처리 시간|문의|비중|비용|온보딩 시간|cpu 피크|p95|p99|매칭 완료까지 걸리는 시간).{0,25}(줄었|줄어들었|개선됐|개선되었|향상됐|향상되었|증가했|감소했|안정화됐|빨라졌|사라졌|쉬워졌|올라갔|낮아졌|내려갔)(습니다|고)'
      - '(덕분에|결과적으로).{0,30}(줄었|개선됐|향상됐|증가했|감소했|안정화됐|빨라졌|사라졌|쉬워졌|올라갔|내려갔)(습니다|고)'
      - '(도움이 됐|도움이 되었|재사용했|재오픈 이슈 없이)(습니다|고)'
      - '(원인과 수정 방향은|원인과 수정 방향이).{0,15}(비교적 )?명확했'
      - '원인(은|이).{0,20}(명확하게 찾았고|명확히 찾았고).{0,20}(수정도 바로 적용했|바로 적용했)'
      - '(체감 성능|처리 시간|응답 시간|문의).{0,25}(좋아졌|줄었|개선됐|향상됐).{0,6}(지만|는데|고)'
      - '(기능 출시|출시 자체).{0,20}(미루지 않았|늦추지 않았)'
      - '(논쟁|리뷰 시간).{0,20}(줄었|짧아졌)'
      - '(실제 )?영향 범위를 같이 다시 확인했'
      - '(일정은|일정이).{0,20}(흔들리지 않았)'
      - '(재현되지 않았|재발은 없었)'
      - '재오픈 이슈 없이.{0,20}(배포까지 갔|배포까지 갔습니다|마무리했|마무리했습니다)'
    METRIC:
      - '(?<!\d)(?<!샘플 데이터 )(?<!테스트 데이터 )(?<!예시 데이터 )\d+(\.\d+)?\s?(%|초|ms|건|배)'
    REASON:
      - '(선택한 이유는|선택 기준은|이유는|기준은)'
      - '(방향으로|쪽으로).{0,20}(정했고|정했습니다|기울었고|기울었습니다|봤고|봤습니다)'
      - '(관점에서|기준으로).{0,20}(정했고|정했습니다|기울었고|기울었습니다|봤고|봤습니다|선택했습니다)'
      - '(가장|더).{0,15}(단순했습니다|자연스러웠습니다|적합했습니다|중요했습니다|낫다고 봤습니다|유리하다고 봤습니다)'
      - '(예외 처리가 많았는데|영업시간이 달라).{0,35}(미리 계산하는 구조로 바꾸|이벤트 기반으로 관리)'
      - '(것 같아서|우려가 있어서|중요해서|필요해서).{0,20}(정리했고|정리했습니다|만들고|만들었습니다|제안했고|제안했습니다|선택했습니다|정했습니다)'
      - '(낫다고|유리하다고|핵심이라고).{0,10}(판단했고|판단했습니다|봤고|봤습니다)'
      - '흐름이 끊기지 않게'
      - '문서화가 부족해서.{0,30}(정리해 공유|정리했고|정리했습니다)'
      - '기준으로.{0,20}(후보를 먼저 걸러|엔드포인트를 나누|응답 포맷을 맞추)'
      - '익숙한 조합이어서.{0,30}(개발하기 좋다고 봤|좋다고 봤)'
      - 'json 형태로 다루기 편해서'
      - '도메인 경계도 아직 자주 바뀌어서'
      - '팀에 익숙한 방식이었고.{0,40}(단순하게 가져가고 싶었습니다|가져가고 싶었)'
      - '(실제 )?조회 빈도와 장애 대응 사례를 모아'
      - '(가능한 범위와 일정 영향|기술적으로 가능한 범위와 일정 영향).{0,20}(설명)'
      - '(기능 정확성|장애 영향도|테스트 유무).{0,30}(세 가지로 나눠 제안했|기준으로)'
    CAUSE:
      - '(확인해 보니|분석해 보니|재현해 보니|추적해 보니)'
      - '원인(은|이).{0,20}(였습니다|이었습니다|이었고|이어서|쪽이었|명확하게 찾았|명확히 찾았|파악했|파악됐)'
      - '(이|가) 원인이었습니다'
      - '원인을.{0,20}(추적해 보니|파악해 보니)'
      - '(실행 계획|검색어 패턴|heap dump).{0,25}(같이 )?보니.{0,25}(충돌|병목|문제|케이스)'
      - '(조회가|트래픽이|요청이).{0,20}(몰리|쏠리).{0,15}(구조였고|구조였습니다)'
    VERIFICATION:
      - '(수정|변경|적용|배포|운영 적용) 후.{0,40}(테스트|검증|확인|비교|모니터링).{0,10}(했고|했습니다|했다)'
      - '(수정|변경|적용|배포|운영 적용) 후.{0,40}(로그|지표|알람|대시보드).{0,20}(확인했|확인했고|확인했습니다|봤고|봤습니다|모니터링했고|모니터링했습니다|비교했고|비교했습니다)'
      - '(부하 테스트|통합 테스트|샘플 계정|대시보드 지표|운영 알람).{0,25}(확인|검증|비교|봤|모니터링)'
      - '(로그|지표|알람|대시보드).{0,20}(확인했고|확인했습니다|봤고|봤습니다|모니터링했고|모니터링했습니다)'
      - '동일한 부하를.{0,20}(비교했고|비교했습니다|걸어 비교했고|걸어 비교했습니다)'
    PREVENTION:
      - '(재발 방지|알람|체크리스트|가드).{0,20}(추가했|추가했고|추가했습니다|적용했|적용했고|적용했습니다|도입했|도입했고|도입했습니다|설정했|설정했고|설정했습니다|걸었|걸었고|걸었습니다|만들었|만들었고|만들었습니다)'
      - '(같은 유형|비슷한 문제|비슷한 실수).{0,30}(먼저 감지|막기 위한|방지하기 위한).{0,25}(알람|체크리스트|가드)'
      - '(알람도|알람을).{0,20}(추가해서|추가했고|추가했습니다)'
      - '(통합 테스트|회귀 테스트|테스트 케이스).{0,12}(추가했고|추가했습니다|보강했고|보강했습니다|만들었고|만들었습니다)'
      - '(같은 패턴|같은 방식|같은 로직).{0,20}(재사용했|재사용했습니다)'
      - '(증분 기준 컬럼을 다시 잡|기준 컬럼을 다시 잡고).{0,20}(나눠서 실행되게 바꿨|실행되게 바꿨습니다)'
    ALTERNATIVE:
      - '(대안으로는|대안은).{0,45}(봤고|봤습니다|봤는데|검토했고|검토했습니다|검토했는데|비교했고|비교했습니다|비교했는데)'
      - ',.{0,35}(검토했고|검토했습니다|검토했는데|비교했고|비교했습니다|비교했는데)'
      - '대신.{0,25}(선택했|선택했습니다|구현했|구현했습니다|적용했|적용했습니다|도입했|도입했습니다|갔습니다|정했습니다)'
      - '대신.{0,25}(썼|썼습니다|사용했|사용했습니다|유지했|유지했습니다)'
      - '(쪼개지 않고|나누지 않고).{0,20}(모놀리스를 유지|단일 구조를 유지)'
    TRADEOFF:
      - '(단점은|단점으로는).{0,60}(있었지만|점이었지만|였습니다|이었습니다)'
      - '(비용|복잡도|운영 부담|러닝커브|유지보수).{0,25}(감수해야 했지만|감수했지만|감수했고|감수했습니다|늘었지만|높았지만|커졌지만|남았지만|올라갔지만)'
      - '(복잡도가|비용이|운영 부담이|러닝커브가).{0,25}(높았지만|컸지만|남았지만|올라간다는 점이었지만|올라갔지만)'
      - '(배포와 디버깅 비용).{0,20}(먼저 줄이는 쪽이 낫다고 봤|줄이는 쪽이 낫다고 봤습니다)'
      - '(운영 환경은 별도 배포 파이프라인으로 가져가고|로컬만 compose로 제한해서)'
    ISSUE:
      - '(갈등|충돌).{0,20}(있었고|있었습니다|있던 적이|이 있었습니다|이 있었고)'
      - '의견 차이.{0,20}(컸던 적이 있|컸습니다|있었고|있었습니다)'
      - '(시각 차이|관점 차이).{0,20}(있었)'
      - '쟁점은.{0,35}(달랐다는 점이었고|달랐습니다)'
      - '(해석 기준|지표 정의|정의).{0,25}(자주 달라|달랐고).{0,25}(협업이 쉽지 않았|반복되었|반복됐)'
      - '(저는|저희는|qa ?쪽은|qa팀은|서비스팀은|보안팀은|인프라팀은|개발팀은|고객사는).{0,40}(봤지만|우선으로 봤고|우선으로 봤습니다|중요하게 봤고|중요하게 봤습니다|입장이었습니다).{0,50}(저는|저희는|qa ?쪽은|qa팀은|서비스팀은|보안팀은|인프라팀은|개발팀은|고객사는).{0,40}(입장이었습니다|우선으로 봤|우선으로 봤습니다|중요하게 봤|중요하게 봤습니다)'
      - '(쪽과|쪽으로).{0,20}(시각 차이|관점 차이).{0,20}(있었)'
    AGREEMENT:
      - '(합의했습니다|합의했고|조율했습니다|조율했고)'
      - '(기준으로|기준을).{0,20}(맞췄고|맞췄습니다|정했고|정했습니다|정리했고|정리했습니다|고정했고|고정했습니다|확정했고|확정했습니다)'
      - '(최종적으로|최종안으로).{0,20}(정했고|정했습니다|합의했고|합의했습니다|확정했고|확정했습니다)'
      - '(하나로|같은 데이터를 기준으로).{0,20}(맞췄고|맞췄습니다|합의했고|합의했습니다)'
      - '리뷰 기준.{0,40}(세 가지로 나눠 제안했)'
    SCOPE_MIXED:
      - '(두 가지|같이 이야기|여러 프로젝트)'

  types:
    PROJECT:
      core: [ROLE, ACTION, RESULT]
      extension: [REASON]
      soft: [METRIC, REFLECTION, SCOPE_MIXED]
      candidateMap:
        RESULT: PROJECT_RESULT_DETAIL
        METRIC: PROJECT_RESULT_METRIC
        REASON: PROJECT_APPROACH_REASON
        SCOPE_MIXED: PROJECT_SCOPE_NARROW
      coreFallback: PROJECT_CORE_CLARIFY
      dynamicWhitelist:
        - missing: [REASON, RESULT]
          require: [ROLE, ACTION]

    PROBLEM:
      core: [CAUSE, ACTION, VERIFICATION]
      extension: [RESULT, PREVENTION]
      soft: [METRIC, REFLECTION]
      candidateMap:
        CAUSE: PROBLEM_CAUSE_DETAIL
        VERIFICATION: PROBLEM_VERIFICATION_DETAIL
        PREVENTION: PROBLEM_PREVENTION_DETAIL
      coreFallback: PROBLEM_CORE_CLARIFY
      dynamicWhitelist:
        - missing: [VERIFICATION, PREVENTION]
          require: [CAUSE, ACTION]

    TECH:
      core: [ALTERNATIVE, REASON, TRADEOFF]
      extension: [RESULT]
      soft: [LIMITATION, REFLECTION]
      candidateMap:
        ALTERNATIVE: TECH_ALTERNATIVE_COMPARE
        TRADEOFF: TECH_TRADEOFF_DETAIL
        RESULT: TECH_EFFECT_AFTER_ADOPTION
      coreFallback: TECH_CORE_CLARIFY
      dynamicWhitelist:
        - missing: [TRADEOFF, RESULT]
          require: [ALTERNATIVE, REASON]

    COLLABORATION:
      core: [ISSUE, ACTION, AGREEMENT]
      extension: [RESULT, REASON]
      soft: [METRIC]
      candidateMap:
        ISSUE: COLLAB_ISSUE_DETAIL
        AGREEMENT: COLLAB_AGREEMENT_CRITERIA
        REASON: COLLAB_DECISION_REASON
        RESULT: COLLAB_RESULT_IMPACT
      coreFallback: COLLAB_CORE_CLARIFY
      dynamicWhitelist:
        - missing: [AGREEMENT, REASON]
          require: [ISSUE, ACTION]
        - missing: [AGREEMENT, RESULT]
          require: [ISSUE, ACTION]
