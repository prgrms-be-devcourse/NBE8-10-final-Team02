spring:
  config:
    import:
      - optional:file:.env.dev[.properties]         # working dir = 프로젝트 루트일 때
      - optional:file:../.env.dev[.properties]    # working dir = backend/ 일 때

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

  datasource:
    # localhost:5432는 로컬 docker-compose에서 뚫어준 포트
    url: jdbc:postgresql://localhost:5432/appdb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # 개발 중엔 테이블 자동 생성
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  # github는 redirectionUrl 하나밖에 지원을 안하기 때문에 LOCAL ID,SECRET이 따로 필요
  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${GITHUB_CLIENT_ID_LOCAL:}
            clientSecret: ${GITHUB_CLIENT_SECRET_LOCAL:}
          google:
            clientId: ${GOOGLE_CLIENT_ID:}
            clientSecret: ${GOOGLE_CLIENT_SECRET:}
          kakao:
            clientId: ${KAKAO_CLIENT_ID:}


analysis:
  # 로컬 개발용 경로 (OCI의 /data/repos, /opt/analysis-scripts 대신 사용)
  # repo-base-path: 백엔드 실행 위치 기준 상대 경로 또는 절대 경로로 재정의 가능
  repo-base-path: ${user.home}/.dev-repos
  scripts-base-path: ${user.dir}/analysis-scripts

logging:
  level:
    root: debug
    com.back.backend: debug

# 개발 환경 JWT 설정
security:
  gitleaks:
    # 로컬 개발 환경에서는 gitleaks 미설치 가능성이 있으므로 기본 비활성화
    enabled: true
  jwt:
    secret: dev-local-jwt-secret-key-for-debugging-a1b2c3d4e5f6071829384756
    access-ttl-seconds: 900 # 15분
    refresh-ttl-seconds: 86400 # 24시간
  cookie:
    secure: false # HTTP 환경에서 쿠키 전송 가능

knowledge:
  github:
    token: ${KNOWLEDGE_GITHUB_TOKEN}
