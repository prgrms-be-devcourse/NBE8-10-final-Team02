version: '3.8'

services:
  app:
    image: ghcr.io/your-namespace/backend:latest
    container_name: prod-spring-app
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms512m -Xmx512m -XX:+UseG1GC
    networks:
      - global-net
    deploy: { resources: { limits: { memory: 1G } } }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    image: ghcr.io/your-namespace/frontend:latest
    container_name: prod-next-app
    expose:
      - "3000"
    environment:
      - NODE_OPTIONS=--max-old-space-size=400
    networks:
      - global-net
    deploy: { resources: { limits: { memory: 512M } } }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 20s
      timeout: 5s
      retries: 3
    depends_on:
      app: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    container_name: prod-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      # 인증서 저장 경로 공유
      - certs:/etc/letsencrypt
      # 인증을 위한 임시 경로 공유
      - certbot-etc:/var/www/certbot
    networks:
      - global-net
    depends_on:
      app: { condition: service_healthy }
      frontend: { condition: service_healthy }
    restart: always

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot-etc:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - global-net


  db:
    image: postgres:15-alpine
    container_name: prod-db
    command: postgres -c shared_buffers=256MB -c max_connections=100
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    expose:
      - "5432"
    volumes:
      - prod-db-data:/var/lib/postgresql/data
      - ./docker/db.init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - global-net
    deploy: { resources: { limits: { memory: 1G } } }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    container_name: prod-redis
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    networks:
      - global-net
    deploy: { resources: { limits: { memory: 256M } } }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: prod-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - global-net
    deploy: { resources: { limits: { memory: 128M } } }
    restart: always

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: prod-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@db:5432/appdb?sslmode=disable"
    expose:
      - "9187"
    networks:
      - global-net
    depends_on:
      db: { condition: service_healthy }
    deploy: { resources: { limits: { memory: 128M } } }
    restart: always

networks:
  global-net:
    external: true

volumes:
  prod-db-data:
  certs:
  certbot-etc: