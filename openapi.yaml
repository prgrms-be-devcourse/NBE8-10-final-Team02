        있을 수 있다.
  /followup-rules/analyze:
    post:
      tags:
      - Followup
      summary: follow-up rules 분석
      description: questionType과 answerText만으로 P0 로컬 follow-up 규칙을 분석한다. 면접 세션 runtime gate가 같은 로컬
        rule engine을 사용하며, `finalAction=USE_CANDIDATE`일 때 `candidateQuestionTypes`는 runtime local deterministic
        follow-up 템플릿 선택 우선순위로 해석한다. complete 직전 마지막 보완 검토에서는 이 로컬 rule 결과를 optional runtime
        summary 입력으로 사용할 수 있지만, thread 선택의 hard gate로는 쓰지 않는다. 이 endpoint는 그 결과를 독립적으로 확인하기
        위한 분석 경로다.
