        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FollowupAnalyzeRequest'
      responses:
        '200':
          description: 분석 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowupAnalyzeApiResponse'
              examples:
                followupAnalyzeSuccess:
                  value:
                    success: true
                    data:
                      questionType: PROJECT
                      signals:
                        ROLE: true
                        ACTION: true
                        RESULT: false
                        REASON: false
                        METRIC: false
                        CAUSE: false
                        VERIFICATION: false
                        PREVENTION: false
                        ALTERNATIVE: false
                        TRADEOFF: false
                        LIMITATION: false
                        ISSUE: false
                        AGREEMENT: false
                        REFLECTION: false
                        SCOPE_MIXED: false
                      orderedMissingGaps:
                      - RESULT
                      - REASON
                      - METRIC
                      primaryGap: RESULT
                      secondaryGap: REASON
                      finalAction: USE_DYNAMIC
                      candidateQuestionTypes: []
                    meta: *id001
        '400':
          description: 요청 validation 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ai/status:
    get:
      tags:
      - AI
      summary: AI 서비스 가용성 상태 조회
      description: >
        인증 없이 접근 가능. 설정된 AI provider(기본 + fallback)의 가용성 상태를 반환한다.
        available=false이면 estimatedWaitSeconds와 message가 포함된다.
        status 값: "available" | "minute_rate_limited" | "daily_exhausted" | "unavailable"
      security: []
      responses:
        '200':
          description: AI 서비스 가용성 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: boolean
                    description: 하나 이상의 provider가 사용 가능한 경우 true
                  estimatedWaitSeconds:
                    type: integer
                    nullable: true
                    description: 모든 provider가 rate limited일 때 예상 대기 초 (available=true면 null)
                  message:
                    type: string
                    nullable: true
                    description: 비가용 상태일 때 사용자에게 표시할 메시지 (available=true면 null)
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: gemini
                        status:
                          type: string
                          enum: [available, minute_rate_limited, daily_exhausted, unavailable]
                        minuteUsage:
                          type: object
                          properties:
                            used:
                              type: integer
                            limit:
                              type: integer
                            percentage:
                              type: integer
                              description: 사용률 퍼센트 (0-100)
                            resetInSeconds:
                              type: integer
                        dailyUsage:
                          type: object
                          properties:
                            used:
                              type: integer
                            limit:
                              type: integer
                            percentage:
                              type: integer
                              description: 사용률 퍼센트 (0-100)
                            resetsAt:
                              type: string
                              format: date-time
                        tokenUsage:
                          type: object
                          properties:
                            minuteUsed:
                              type: integer
                              format: int64
                            minuteLimit:
                              type: integer
                              format: int64
                            minutePercentage:
                              type: integer
                              description: 분당 토큰 사용률 퍼센트 (0-100)
                            dailyUsed:
                              type: integer
                              format: int64
                            dailyLimit:
                              type: integer
                              format: int64
                              nullable: true
                            dailyPercentage:
                              type: integer
                              nullable: true
                              description: 일간 토큰 사용률 퍼센트 (0-100). dailyLimit이 null이면 null
              examples:
