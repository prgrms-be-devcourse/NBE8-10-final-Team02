          description: 답변 저장
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/SessionAnswerSubmitData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                sessionAnswerSubmitSuccess:
                  value:
                    success: true
                    data:
                      sessionId: 901
                      questionId: 801
                      answerOrder: 1
                      isSkipped: false
                      submittedAt: '2026-03-17T10:36:00Z'
                    meta: *id001
        '400':
          description: 답변 필수 또는 길이 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                answerRequired:
                  value:
                    success: false
                    error:
                      code: INTERVIEW_ANSWER_REQUIRED
                      message: 답변을 입력해주세요.
                      retryable: false
                      fieldErrors:
                      - field: answerText
                        reason: required
                    meta: *id001
                answerTooShort:
                  value:
                    success: false
                    error:
                      code: INTERVIEW_ANSWER_TOO_SHORT
                      message: 답변은 50자 이상 입력해주세요.
                      retryable: false
                      fieldErrors:
                      - field: answerText
                        reason: min_50
                    meta: *id001
        '404':
          description: 세션 또는 질문을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionOrQuestionNotFound:
                  value:
                    success: false
                    error:
                      code: RESOURCE_NOT_FOUND
                      message: 세션 또는 질문을 찾을 수 없습니다.
                      retryable: false
                    meta: *id001
        '409':
          description: 진행 가능한 세션이 아니거나 이미 종료된 세션임
          content:
            application/json:
