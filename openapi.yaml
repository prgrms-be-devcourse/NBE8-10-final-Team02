      - GitHub
      summary: 저장소 커밋 동기화 시작
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '202':
          description: 동기화 시작
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/RepositorySyncData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                repositorySyncQueued:
                  value:
                    success: true
                    data:
                      repositoryId: 101
                      syncStatus: queued
                      queuedAt: '2026-03-17T10:31:00Z'
