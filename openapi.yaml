                      retryable: false
                      fieldErrors:
                      - field: answerText
                        reason: min_50
                    meta: *id001
        '404':
          description: 세션 또는 질문을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionOrQuestionNotFound:
                  value:
                    success: false
                    error:
                      code: RESOURCE_NOT_FOUND
                      message: 세션 또는 질문을 찾을 수 없습니다.
                      retryable: false
                    meta: *id001
        '409':
          description: 진행 가능한 세션이 아니거나 이미 종료된 세션임
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionNotActive:
                  value:
                    success: false
                    error:
                      code: INTERVIEW_SESSION_NOT_ACTIVE
                      message: 진행 가능한 면접 세션이 아닙니다. 재개 후 다시 시도해주세요.
                      retryable: false
                    meta: *id001
                sessionAlreadyCompleted:
                  value:
                    success: false
                    error:
                      code: INTERVIEW_SESSION_ALREADY_COMPLETED
                      message: 이미 종료된 면접 세션입니다.
                      retryable: false
                    meta: *id001
      description: 세션 답변을 저장한다. 일반 답변은 `in_progress` 상태에서만 허용한다. questionId는 세션 질문 id이며,
        현재 질문과 일치해야 한다. answerOrder는 다음 제출 순번과 일치해야 한다. 세션 또는 질문이 현재 사용자 범위에서
        없으면 404를 반환한다. 이 endpoint는 답변 저장까지만 담당하며 follow-up 생성 여부는 직접 응답하지 않는다.
        클라이언트는 저장 성공 후 `GET /interview/sessions/{sessionId}`를 재조회해 다음 질문을 확인한다. 재조회 경로에서는 로컬
        rule 결과가 `USE_CANDIDATE`일 때 `candidateQuestionTypes` 기반 로컬 deterministic follow-up을 먼저 검토하고,
        `USE_DYNAMIC`일 때만 runtime dynamic follow-up AI 생성을 검토한다. 세션 마지막 전체 보완 1회는 runtime에서
        follow-up으로 확정되지 못한 positive와 FN을 다시 본다.
        v1 자동 일시정지는 답변 제출 요청 진입 시점에도 `lastActivityAt` 기준으로 평가하며,
        30분 초과 상태의 세션은 `paused`로 정규화한 뒤 답변 제출을 막는다.
