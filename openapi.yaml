                    error:
                      code: INTERVIEW_SESSION_ALREADY_COMPLETED
                      message: 이미 종료된 면접 세션입니다.
                      retryable: false
                    meta: *id001
      description: 세션 답변을 저장한다. 일반 답변은 `in_progress` 상태에서만 허용한다. questionId와 answerOrder는 현재 순번과
        일치해야 한다. 세션 또는 질문이 현재 사용자 범위에서 없으면 404를 반환한다. v1 자동 일시정지는 답변 제출 요청 진입
