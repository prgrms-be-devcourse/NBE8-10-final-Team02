                  format: int64
                answerOrder:
                  type: integer
                answerText:
                  type: string
                  minLength: 50
                  maxLength: 1000
                  description: 건너뛰기 아닌 일반 답변은 50자 이상 1000자 이하
                isSkipped:
                  type: boolean
              required:
              - questionId
              - answerOrder
              - isSkipped
              description: isSkipped=false인 경우 answerText는 최소 50자 이상이어야 하며, questionId와 answerOrder는 현재 순번과 일치해야 한다.
