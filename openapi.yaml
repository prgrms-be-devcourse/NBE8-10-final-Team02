  /github/repositories/{repositoryId}/analyze:
    post:
      tags:
      - GitHub
      summary: 저장소 분석 파이프라인 시작
      description: |
        clone → 정적 분석 → Code Index 저장 → RepoSummary AI 생성 → MergedSummary 재집계 파이프라인을 비동기로 시작한다.
        커밋 동기화(sync-commits)가 먼저 완료된 상태에서 호출해야 한다.
        Significance Check 미달 시 SKIPPED 상태로 종료되고 LLM 호출 없이 반환한다.
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '202':
          description: 분석 파이프라인 시작 (비동기)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/RepoSyncStatus'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
        '404':
          description: 저장소 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
