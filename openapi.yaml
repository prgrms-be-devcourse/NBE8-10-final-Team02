openapi: 3.0.3
info:
  title: AI 기술 면접 연습 플랫폼 API
  version: 0.4.1
  description: 핵심 사용자 흐름과 최신 요구사항 변경안을 반영한 OpenAPI 계약. API 변경 시 docs/requirements.md,
    docs/project/open-items.md와 함께 수정한다. 핵심 성공 응답은 success/data/meta 형태와 예시 응답을 포함한다.
servers:
- url: /api/v1
tags:
- name: Auth
- name: GitHub
- name: Documents
- name: Applications
- name: Interview
- name: Followup
- name: AI
components:
  securitySchemes:
    AuthorizationHeader:
      type: apiKey
      in: header
      name: Authorization
      description: '형식: Bearer {apiKey} {accessToken}'
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
        pagination:
          $ref: '#/components/schemas/Pagination'
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            retryAfterSeconds:
              type: integer
              nullable: true
              description: rate limit 시 재시도까지 기다려야 하는 초. null이면 해당 없음.
            fieldErrors:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
          required:
          - code
          - message
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - success
      - error
      - meta
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        displayName:
          type: string
        email:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - active
          - withdrawn
      required:
      - id
      - displayName
      - status
    GithubConnection:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        githubUserId:
          type: integer
          format: int64
        githubLogin:
          type: string
        accessScope:
          type: string
          nullable: true
          description: OAuth 동의 범위. private repository 조회가 필요한 경우 추가 scope가 포함될 수
            있다.
        syncStatus:
          type: string
          enum:
          - pending
          - success
          - failed
        connectedAt:
          type: string
          format: date-time
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - userId
      - githubUserId
      - githubLogin
      - syncStatus
      - connectedAt
    Repository:
      type: object
      properties:
        id:
          type: integer
          format: int64
        githubRepoId:
          type: integer
          format: int64
        ownerLogin:
          type: string
        repoName:
          type: string
        fullName:
          type: string
        htmlUrl:
          type: string
        visibility:
          type: string
          enum:
          - public
          - private
          - internal
        defaultBranch:
          type: string
          nullable: true
        isSelected:
          type: boolean
        hasCommits:
          type: boolean
          description: 커밋 동기화 완료 여부. false면 포트폴리오 분석 불가
        analysisStatus:
          allOf:
            - $ref: '#/components/schemas/RepoSyncStatus'
            - description: 분석 상태. 분석 미요청 또는 TTL 만료 시 null
              nullable: true
        pushedAt:
          type: string
          format: date-time
          nullable: true
          description: GitHub pushed_at. 기여/URL 추가 경로는 null
        ownerType:
          type: string
          nullable: true
          enum:
          - owner
          - collaborator
          description: 저장 시점에 결정됨. 기존 데이터는 null
        language:
          type: string
          nullable: true
          description: primary language
      required:
      - id
      - githubRepoId
      - fullName
      - htmlUrl
      - visibility
      - isSelected
      - hasCommits
    SaveContributionRequest:
      type: object
      properties:
        githubRepoId:
          type: integer
          format: int64
        nameWithOwner:
          type: string
          description: 'owner/repo 형식'
          example: spring-projects/spring-security
        url:
          type: string
        language:
          type: string
          nullable: true
        repoSizeKb:
          type: integer
          nullable: true
      required:
      - githubRepoId
      - nameWithOwner
      - url
    AddContributionByUrlRequest:
      type: object
      properties:
        url:
          type: string
          description: 'GitHub repo URL (예: https://github.com/owner/repo)'
      required:
      - url
    ContributedRepo:
      type: object
      properties:
        githubRepoId:
          type: integer
          format: int64
        nameWithOwner:
          type: string
        url:
          type: string
        language:
          type: string
          nullable: true
        repoSizeKb:
          type: integer
          nullable: true
        contributionCount:
          type: integer
        alreadySaved:
          type: boolean
          description: 이미 github_repositories에 저장된 repo 여부
        repositoryId:
          type: integer
          format: int64
          nullable: true
          description: 'github_repositories.id (저장된 경우에만 non-null)'
      required:
      - githubRepoId
      - nameWithOwner
      - url
      - contributionCount
      - alreadySaved
    Document:
      type: object
      properties:
        id:
          type: integer
          format: int64
        documentType:
          type: string
          enum:
          - resume
          - award
          - certificate
          - other
        originalFileName:
          type: string
        mimeType:
          type: string
          description: '허용 MIME type: application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document,
            text/markdown, text/plain'
        fileSizeBytes:
          type: integer
          format: int64
          description: 최대 52428800 bytes (50MB)
        extractStatus:
          type: string
          enum:
          - pending
          - success
          - failed
        uploadedAt:
          type: string
          format: date-time
        extractedAt:
          type: string
          format: date-time
          nullable: true
        extractedText:
          type: string
          nullable: true
      required:
      - id
      - documentType
      - originalFileName
      - mimeType
      - fileSizeBytes
      - extractStatus
      - uploadedAt
    Application:
      type: object
      properties:
        id:
          type: integer
          format: int64
        applicationTitle:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        jobRole:
          type: string
        status:
          type: string
          enum:
          - draft
          - ready
          description: 'draft: 작업 중, ready: jobRole, 1개 이상 source, 1개 이상 question, 모든 question의 유효 답변이 준비되어 면접 질문 생성과 이후 흐름에 사용할 수 있는 상태'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        applicationType:
          type: string
          nullable: true
          description: '지원 유형 예: 신입, 인턴, 경력'
      required:
      - id
      - jobRole
      - status
      - createdAt
      - updatedAt
    ApplicationQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionOrder:
          type: integer
        questionText:
          type: string
        generatedAnswer:
          type: string
          nullable: true
        editedAnswer:
          type: string
          nullable: true
        toneOption:
          type: string
          nullable: true
          enum:
          - formal
          - balanced
          - casual
        lengthOption:
          type: string
          nullable: true
          enum:
          - short
          - medium
          - long
          description: short<=700 chars, medium<=1200 chars, long<=1800 chars
        emphasisPoint:
          type: string
          nullable: true
      required:
      - id
      - questionOrder
      - questionText
    InterviewQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionOrder:
          type: integer
        questionType:
          type: string
          enum:
          - experience
          - project
          - technical_cs
          - technical_stack
          - behavioral
          - follow_up
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        questionText:
          type: string
        parentQuestionId:
          type: integer
          format: int64
          nullable: true
        sourceApplicationQuestionId:
          type: integer
          format: int64
          nullable: true
      required:
      - id
      - questionOrder
      - questionType
      - difficultyLevel
      - questionText
    InterviewSession:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionSetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ready
          - in_progress
          - paused
          - completed
          - feedback_completed
          description: 'ready: 시작 전, in_progress: 진행 중, paused: 일시중지, completed: 종료,
            feedback_completed: 피드백 완료'
        totalScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        summaryFeedback:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - questionSetId
      - status
    InterviewSessionCurrentQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 세션 질문 id. 질문 세트 원본 질문 id가 아니라 현재 세션 스냅샷 기준 식별자
        questionOrder:
          type: integer
        questionType:
          type: string
          enum:
          - experience
          - project
          - technical_cs
          - technical_stack
          - behavioral
          - follow_up
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        questionText:
          type: string
      required:
      - id
      - questionOrder
      - questionType
      - difficultyLevel
      - questionText
    InterviewSessionAnswerSummary:
      type: object
      properties:
        answerOrder:
          type: integer
        answerText:
          type: string
          nullable: true
        isSkipped:
          type: boolean
      required:
      - answerOrder
      - isSkipped
    InterviewSessionTranscriptEntry:
      type: object
      properties:
        question:
          $ref: '#/components/schemas/InterviewSessionCurrentQuestion'
        answer:
          $ref: '#/components/schemas/InterviewSessionAnswerSummary'
      required:
      - question
      - answer
    CompletionFollowupContext:
      type: object
      properties:
        rootQuestion:
          $ref: '#/components/schemas/InterviewSessionCurrentQuestion'
        rootAnswer:
          $ref: '#/components/schemas/InterviewSessionAnswerSummary'
        runtimeFollowupQuestion:
          allOf:
          - $ref: '#/components/schemas/InterviewSessionCurrentQuestion'
          nullable: true
        runtimeFollowupAnswer:
          allOf:
          - $ref: '#/components/schemas/InterviewSessionAnswerSummary'
          nullable: true
        completionFollowupQuestion:
          $ref: '#/components/schemas/InterviewSessionCurrentQuestion'
        parentQuestionOrder:
          type: integer
      required:
      - rootQuestion
      - rootAnswer
      - completionFollowupQuestion
      - parentQuestionOrder
    InterviewSessionDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionSetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ready
          - in_progress
          - paused
          - completed
          - feedback_completed
          description: 'ready: 시작 전, in_progress: 진행 중, paused: 일시중지, completed: 종료,
            feedback_completed: 피드백 완료'
        currentQuestion:
          allOf:
          - $ref: '#/components/schemas/InterviewSessionCurrentQuestion'
          nullable: true
        completionFollowupContext:
          allOf:
          - $ref: '#/components/schemas/CompletionFollowupContext'
          nullable: true
        transcriptEntries:
          type: array
          description: answered question/answer pair 목록. answerOrder 오름차순이며 현재 미응답 currentQuestion과 system 메시지는 포함하지 않음
          items:
            $ref: '#/components/schemas/InterviewSessionTranscriptEntry'
        totalQuestionCount:
          type: integer
        answeredQuestionCount:
          type: integer
        remainingQuestionCount:
          type: integer
        resumeAvailable:
          type: boolean
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - questionSetId
      - status
      - completionFollowupContext
      - transcriptEntries
      - totalQuestionCount
      - answeredQuestionCount
      - remainingQuestionCount
      - resumeAvailable
      - totalQuestionCount
      - answeredQuestionCount
      - remainingQuestionCount
      - resumeAvailable
    InterviewSessionTransitionData:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - in_progress
          - paused
        updatedAt:
          type: string
          format: date-time
      required:
      - sessionId
      - status
      - updatedAt
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
      required:
      - field
      - reason
    FeedbackTag:
      type: object
      properties:
        tagId:
          type: integer
          format: int64
        tagName:
          type: string
          enum:
          - 질문 의도 미충족
          - 답변 미완
          - 구체성 부족
          - 문제 해결 설명 부족
          - 답변 구조 미흡
          - 근거 부족
          - 기술 정확도 부족
          - 기술 깊이 부족
          - 선택 근거 부족
          - 표현 명확성 부족
        tagCategory:
          type: string
          enum:
          - content
          - structure
          - evidence
          - communication
          - technical
          - other
      required:
      - tagId
      - tagName
      - tagCategory
    InterviewAnswerResult:
      type: object
      properties:
        answerId:
          type: integer
          format: int64
        questionId:
          type: integer
          format: int64
          description: 세션 질문 id
        questionType:
          type: string
          description: 세션 질문 유형. `follow_up`이면 결과 화면에서 꼬리 질문 배지를 표시할 수 있다.
          enum:
          - experience
          - project
          - technical_cs
          - technical_stack
          - behavioral
          - follow_up
        questionText:
          type: string
        answerText:
          type: string
          nullable: true
        score:
          type: integer
          minimum: 0
          maximum: 100
        evaluationRationale:
          type: string
        tags:
          type: array
          maxItems: 3
          items:
            $ref: '#/components/schemas/FeedbackTag'
      required:
      - answerId
      - questionId
      - questionType
      - questionText
      - score
      - evaluationRationale
      - tags
    InterviewResult:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        questionSetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - completed
          - feedback_completed
        totalScore:
          type: integer
          minimum: 0
          maximum: 100
        summaryFeedback:
          type: string
        answers:
          type: array
          items:
            $ref: '#/components/schemas/InterviewAnswerResult'
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - sessionId
      - questionSetId
      - status
      - totalScore
      - summaryFeedback
      - answers
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
      required:
      - page
      - size
      - totalElements
      - totalPages
    AuthorizationStartData:
      type: object
      properties:
        provider:
          type: string
          enum:
          - github
          - google
          - kakao
        authorizationUrl:
          type: string
        state:
          type: string
      required:
      - provider
      - authorizationUrl
      - state
    OAuthCallbackData:
      type: object
      properties:
        provider:
          type: string
          enum:
          - github
          - google
          - kakao
        isNewUser:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
      required:
      - provider
      - isNewUser
      - user
    LogoutData:
      type: object
      properties:
        loggedOut:
          type: boolean
          example: true
      required:
      - loggedOut
    RepositorySelectionData:
      type: object
      properties:
        selectedRepositoryIds:
          type: array
          items:
            type: integer
            format: int64
        selectedCount:
          type: integer
      required:
      - selectedRepositoryIds
      - selectedCount
    RepositorySyncData:
      type: object
      properties:
        repositoryId:
          type: integer
          format: int64
        syncStatus:
          type: string
          description: 동기화 시작 요청의 처리 상태. 저장되는 github_connections.sync_status(pending/success/failed)와는 별개다.
          enum:
          - queued
          - running
          - completed
          - failed
        queuedAt:
          type: string
          format: date-time
      required:
      - repositoryId
      - syncStatus
      - queuedAt
    RepoSyncStatus:
      type: object
      nullable: true
      properties:
        repositoryId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING
          - IN_PROGRESS
          - COMPLETED
          - SKIPPED
          - FAILED
          description: PENDING=대기중, IN_PROGRESS=처리중, COMPLETED=완료, SKIPPED=분석 생략(skipReason 참조), FAILED=오류
        step:
          type: string
          nullable: true
          description: IN_PROGRESS 시 현재 단계 (significance_check|clone|analysis|summary)
        startedAt:
          type: string
          format: date-time
          nullable: true
        estimatedEndAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
        skipReason:
          type: string
          nullable: true
          description: SKIPPED 상태일 때 skip 이유 (예:"커밋이 없습니다. 커밋 동기화를 먼저 실행해주세요.", "최근 변경량이 기준치에 미달합니다.")
      required:
      - repositoryId
      - status
    ApplicationSourceBindingData:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        repositoryIds:
          type: array
          items:
            type: integer
            format: int64
        documentIds:
          type: array
          items:
            type: integer
            format: int64
        sourceCount:
          type: integer
      required:
      - applicationId
      - repositoryIds
      - documentIds
      - sourceCount
    GeneratedApplicationAnswer:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
        questionText:
          type: string
        generatedAnswer:
          type: string
        toneOption:
          type: string
          nullable: true
          enum:
          - formal
          - balanced
          - casual
        lengthOption:
          type: string
          nullable: true
          enum:
          - short
          - medium
          - long
      required:
      - questionId
      - questionText
      - generatedAnswer
    ApplicationAnswerGenerationData:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        generatedCount:
          type: integer
        regenerate:
          type: boolean
        answers:
          type: array
          items:
            $ref: '#/components/schemas/GeneratedApplicationAnswer'
      required:
      - applicationId
      - generatedCount
      - regenerate
      - answers
    InterviewQuestionSetSummary:
      type: object
      properties:
        questionSetId:
          type: integer
          format: int64
        applicationId:
          type: integer
          format: int64
        title:
          type: string
        questionCount:
          type: integer
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        createdAt:
          type: string
          format: date-time
      required:
      - questionSetId
      - applicationId
      - title
      - questionCount
      - difficultyLevel
      - createdAt
    InterviewQuestionSetDetail:
      type: object
      properties:
        questionSetId:
          type: integer
          format: int64
        applicationId:
          type: integer
          format: int64
        title:
          type: string
        questionCount:
          type: integer
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        questions:
          type: array
          items:
            $ref: '#/components/schemas/InterviewQuestion'
        createdAt:
          type: string
          format: date-time
      required:
      - questionSetId
      - applicationId
      - title
      - questionCount
      - difficultyLevel
      - questions
      - createdAt
    SessionAnswerSubmitData:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        questionId:
          type: integer
          format: int64
          description: 저장된 세션 질문 id
        answerOrder:
          type: integer
        isSkipped:
          type: boolean
        submittedAt:
          type: string
          format: date-time
      required:
      - sessionId
      - questionId
      - answerOrder
      - isSkipped
      - submittedAt
    SessionCompletionData:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - completed
          - feedback_completed
        totalScore:
          type: integer
          minimum: 0
          maximum: 100
        summaryFeedback:
          type: string
        endedAt:
          type: string
          format: date-time
      required:
      - sessionId
      - status
      - totalScore
      - summaryFeedback
      - endedAt
    FollowupQuestionType:
      type: string
      enum:
      - PROJECT
      - PROBLEM
      - TECH
      - COLLABORATION
    FollowupGapType:
      type: string
      enum:
      - ROLE
      - ACTION
      - RESULT
      - REASON
      - METRIC
      - CAUSE
      - VERIFICATION
      - PREVENTION
      - ALTERNATIVE
      - TRADEOFF
      - LIMITATION
      - ISSUE
      - AGREEMENT
      - REFLECTION
      - SCOPE_MIXED
    FollowupFinalAction:
      type: string
      enum:
      - NO_FOLLOW_UP
      - USE_CANDIDATE
      - USE_DYNAMIC
    FollowupCandidateQuestionType:
      type: string
      enum:
      - PROJECT_RESULT_DETAIL
      - PROJECT_RESULT_METRIC
      - PROJECT_APPROACH_REASON
      - PROJECT_SCOPE_NARROW
      - PROJECT_CORE_CLARIFY
      - PROBLEM_CAUSE_DETAIL
      - PROBLEM_VERIFICATION_DETAIL
      - PROBLEM_PREVENTION_DETAIL
      - PROBLEM_CORE_CLARIFY
      - TECH_ALTERNATIVE_COMPARE
      - TECH_TRADEOFF_DETAIL
      - TECH_EFFECT_AFTER_ADOPTION
      - TECH_CORE_CLARIFY
      - COLLAB_ISSUE_DETAIL
      - COLLAB_AGREEMENT_CRITERIA
      - COLLAB_DECISION_REASON
      - COLLAB_RESULT_IMPACT
      - COLLAB_CORE_CLARIFY
    FollowupSignals:
      type: object
      properties:
        ROLE:
          type: boolean
        ACTION:
          type: boolean
        RESULT:
          type: boolean
        REASON:
          type: boolean
        METRIC:
          type: boolean
        CAUSE:
          type: boolean
        VERIFICATION:
          type: boolean
        PREVENTION:
          type: boolean
        ALTERNATIVE:
          type: boolean
        TRADEOFF:
          type: boolean
        LIMITATION:
          type: boolean
        ISSUE:
          type: boolean
        AGREEMENT:
          type: boolean
        REFLECTION:
          type: boolean
        SCOPE_MIXED:
          type: boolean
      required:
      - ROLE
      - ACTION
      - RESULT
      - REASON
      - METRIC
      - CAUSE
      - VERIFICATION
      - PREVENTION
      - ALTERNATIVE
      - TRADEOFF
      - LIMITATION
      - ISSUE
      - AGREEMENT
      - REFLECTION
      - SCOPE_MIXED
    FollowupAnalyzeRequest:
      type: object
      properties:
        questionType:
          $ref: '#/components/schemas/FollowupQuestionType'
        answerText:
          type: string
      required:
      - questionType
      - answerText
    FollowupAnalyzeData:
      type: object
      properties:
        questionType:
          $ref: '#/components/schemas/FollowupQuestionType'
        signals:
          $ref: '#/components/schemas/FollowupSignals'
        orderedMissingGaps:
          type: array
          items:
            $ref: '#/components/schemas/FollowupGapType'
        primaryGap:
          allOf:
          - $ref: '#/components/schemas/FollowupGapType'
          nullable: true
        secondaryGap:
          allOf:
          - $ref: '#/components/schemas/FollowupGapType'
          nullable: true
        finalAction:
          $ref: '#/components/schemas/FollowupFinalAction'
        candidateQuestionTypes:
          type: array
          description: finalAction이 `USE_CANDIDATE`일 때 runtime local deterministic follow-up 템플릿 선택에 쓰는 우선순위 후보 목록. 그 외에는 빈 배열일 수 있다.
          items:
            $ref: '#/components/schemas/FollowupCandidateQuestionType'
      required:
      - questionType
      - signals
      - orderedMissingGaps
      - primaryGap
      - secondaryGap
      - finalAction
      - candidateQuestionTypes
    FollowupAnalyzeApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/FollowupAnalyzeData'
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - success
      - data
      - meta
security:
- AuthorizationHeader: []
paths:
  /auth/oauth2/{provider}/authorize:
    get:
      tags:
      - Auth
      summary: OAuth2 로그인 시작
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - github
          - google
          - kakao
      responses:
        '200':
          description: 인증 URL 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AuthorizationStartData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                authorizationStartExample:
                  value:
                    success: true
                    data:
                      provider: github
                      authorizationUrl: https://github.com/login/oauth/authorize?client_id=example&state=st_123
                      state: st_123
                    meta: &id001
                      requestId: req_20260317_0001
                      timestamp: '2026-03-17T10:30:00Z'
        '400':
          description: 지원하지 않는 provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidProvider:
                  value:
                    success: false
                    error:
                      code: AUTH_UNSUPPORTED_PROVIDER
                      message: 지원하지 않는 로그인 제공자입니다.
                      retryable: false
                    meta: *id001
  /auth/oauth2/{provider}/callback:
    get:
      tags:
      - Auth
      summary: OAuth2 콜백 처리
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - github
          - google
          - kakao
      - name: code
        in: query
        required: false
        schema:
          type: string
      - name: state
        in: query
        required: false
        schema:
          type: string
      - name: error
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OAuthCallbackData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                oauthCallbackSuccess:
                  value:
                    success: true
                    data:
                      provider: github
                      isNewUser: false
                      user:
                        id: 1
                        displayName: q q
                        email: user@example.com
                        profileImageUrl: https://avatars.githubusercontent.com/u/1?v=4
                        status: active
                    meta: *id001
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                oauthFailure:
                  value:
                    success: false
                    error:
                      code: AUTH_PROVIDER_RESPONSE_INVALID
                      message: 소셜 로그인 인증 처리에 실패했습니다.
                      retryable: false
                    meta: *id001
  /users/me:
    get:
      tags:
      - Auth
      summary: 내 정보 조회
      responses:
        '200':
          description: 내 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                userMeSuccess:
                  value:
                    success: true
                    data:
                      id: 1
                      displayName: q q
                      email: user@example.com
                      profileImageUrl: https://avatars.githubusercontent.com/u/1?v=4
                      status: active
                    meta: *id001
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                authRequired:
                  value:
                    success: false
                    error:
                      code: AUTH_REQUIRED
                      message: 로그인이 필요합니다.
                      retryable: false
                    meta: *id001
  /auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/LogoutData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                logoutSuccess:
                  value:
                    success: true
                    data:
                      loggedOut: true
                    meta: *id001
  /github/connections:
    post:
      tags:
      - GitHub
      summary: GitHub 연결 생성 또는 갱신
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum:
                  - oauth
                  - url
                githubLogin:
                  type: string
                githubUserId:
                  type: integer
                  format: int64
                accessScope:
                  type: string
                  description: private repository 접근이 필요한 경우 provider 동의로 획득한 scope
                    문자열
                githubProfileUrl:
                  type: string
              required:
              - mode
      responses:
        '201':
          description: 연결 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/GithubConnection'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                githubConnectionSuccess:
                  value:
                    success: true
                    data:
                      id: 10
                      userId: 1
                      githubUserId: 123456
                      githubLogin: octocat
                      accessScope: read:user repo
                      syncStatus: success
                      connectedAt: '2026-03-17T10:29:30Z'
                      lastSyncedAt: '2026-03-17T10:29:50Z'
                    meta: *id001
  /github/connections/refresh:
    post:
      tags:
      - GitHub
      summary: GitHub 연결 갱신 (저장된 토큰으로 repo 목록 동기화)
      description: 저장된 GitHub OAuth 토큰을 사용해 GitHub API에서 repo 목록을 가져오고 DB에 반영한다.
      responses:
        '202':
          description: 갱신 요청 수락
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/GithubConnection'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
        '404':
          description: GitHub 연결 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /github/repositories:
    get:
      tags:
      - GitHub
      summary: 저장소 목록 조회
      parameters:
      - name: selected
        in: query
        required: false
        schema:
          type: boolean
      - name: visibility
        in: query
        required: false
        schema:
          type: string
          enum:
          - public
          - private
          - internal
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: size
        in: query
        required: false
        schema:
          type: integer
          default: 20
      responses:
        '200':
          description: 저장소 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Repository'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                repositoryListSuccess:
                  value:
                    success: true
                    data:
                    - id: 101
                      githubRepoId: 987654
                      ownerLogin: octocat
                      repoName: ai-interview-platform
                      fullName: octocat/ai-interview-platform
                      htmlUrl: https://github.com/octocat/ai-interview-platform
                      visibility: public
                      defaultBranch: main
                      isSelected: true
                    meta: &id002
                      requestId: req_20260317_0002
                      timestamp: '2026-03-17T10:30:05Z'
                      pagination:
                        page: 1
                        size: 20
                        totalElements: 1
                        totalPages: 1
  /github/repositories/selection:
    put:
      tags:
      - GitHub
      summary: 저장소 선택 상태 저장
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repositoryIds:
                  type: array
                  items:
                    type: integer
                    format: int64
              required:
              - repositoryIds
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/RepositorySelectionData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                repositorySelectionSuccess:
                  value:
                    success: true
                    data:
                      selectedRepositoryIds:
                      - 101
                      selectedCount: 1
                    meta: *id001
  /github/repositories/{repositoryId}/sync-commits:
    post:
      tags:
      - GitHub
      summary: 저장소 커밋 동기화 시작
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '202':
          description: 동기화 시작
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/RepositorySyncData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                repositorySyncQueued:
                  value:
                    success: true
                    data:
                      repositoryId: 101
                      syncStatus: queued
                      queuedAt: '2026-03-17T10:31:00Z'
                    meta: *id001
        '403':
          description: private/internal repository 접근 scope 부족
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                privateScopeError:
                  value:
                    success: false
                    error:
                      code: GITHUB_SCOPE_INSUFFICIENT
                      message: private repository 조회 권한이 부족합니다.
                      retryable: false
                      fieldErrors:
                      - field: accessScope
                        reason: missing_private_repo_scope
                    meta: *id001
      description: 선택한 repository의 사용자 본인 commit 동기화를 시작한다. private repository는 GitHub
        OAuth 추가 동의가 있는 경우에만 지원한다.
  /github/repositories/{repositoryId}/analyze:
    post:
      tags:
      - GitHub
      summary: 저장소 분석 파이프라인 시작
      description: |
        clone → 정적 분석 → Code Index 저장 → RepoSummary AI 생성 → MergedSummary 재집계 파이프라인을 비동기로 시작한다.
        커밋 동기화(sync-commits)가 먼저 완료된 상태에서 호출해야 한다.
        Significance Check 미달 시 SKIPPED 상태로 종료되고 LLM 호출 없이 반환한다.
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '202':
          description: 분석 파이프라인 시작 (비동기)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/RepoSyncStatus'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
        '404':
          description: 저장소 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - GitHub
      summary: 분석 파이프라인 취소
      description: PENDING/IN_PROGRESS 상태의 분석을 중단하고 상태를 FAILED로 변경한다. 이미 완료됐거나 없는 분석에 대해서도 200을 반환한다 (idempotent).
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: 취소 성공 (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    nullable: true
                    example: null
                  meta:
                    $ref: '#/components/schemas/Meta'
  /github/repositories/{repositoryId}/sync-status:
    get:
      tags:
      - GitHub
      summary: 저장소 커밋 동기화 상태 조회
      description: 특정 저장소의 커밋 동기화 진행 상태를 Redis에서 조회한다. 상태가 없으면 null을 반환한다.
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: 동기화 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/RepoSyncStatus'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                syncInProgress:
                  value:
                    success: true
                    data:
                      repositoryId: 101
                      status: IN_PROGRESS
                      step: "clone"
                      startedAt: '2026-03-17T10:31:00Z'
                      estimatedEndAt: '2026-03-17T10:33:00Z'
                    meta: *id001
                syncCompleted:
                  value:
                    success: true
                    data:
                      repositoryId: 101
                      status: COMPLETED
                      startedAt: '2026-03-17T10:31:00Z'
                      completedAt: '2026-03-17T10:32:45Z'
                    meta: *id001
                syncNotFound:
                  value:
                    success: true
                    data: null
                    meta: *id001
  /github/repositories/{repositoryId}:
    delete:
      tags:
      - GitHub
      summary: 저장소 삭제
      description: 기여 repo를 github_repositories에서 완전히 삭제한다. 진행 중인 분석 취소 + 관련 데이터(커밋, 코드 인덱스, 요약) 삭제 후 MergedSummary 재집계.
      parameters:
      - name: repositoryId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    nullable: true
                    example: null
                  meta:
                    $ref: '#/components/schemas/Meta'
        '404':
          description: 저장소 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /github/contributions/discovered:
    get:
      tags:
      - GitHub
      summary: 기여한 public repo 탐색
      description: GitHub OAuth 토큰으로 사용자가 커밋을 기여한 public repo 목록을 조회한다. 본인 소유 외에 org, 오픈소스 repo도 포함된다. GitHub OAuth 연동이 필수다.
      parameters:
      - name: yearsOffset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
        description: '조회 기간 오프셋. 0=최근 2년(기본값), 1=2~4년 전, 2=4~6년 전. "이전 기여 더 불러오기" 기능에 사용한다.'
      responses:
        '200':
          description: 기여 repo 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContributedRepo'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                contributionListSuccess:
                  value:
                    success: true
                    data:
                    - githubRepoId: 987654
                      nameWithOwner: prgrms-be-devcourse/NBE8-10-final-Team02
                      url: https://github.com/prgrms-be-devcourse/NBE8-10-final-Team02
                      language: Java
                      repoSizeKb: 8240
                      contributionCount: 23
                      alreadySaved: true
                    - githubRepoId: 111222
                      nameWithOwner: spring-projects/spring-security
                      url: https://github.com/spring-projects/spring-security
                      language: Java
                      repoSizeKb: 158000
                      contributionCount: 2
                      alreadySaved: false
                    meta: *id001
        '403':
          description: GitHub OAuth 연동 없음 (access token 없음)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noOAuthToken:
                  value:
                    success: false
                    error:
                      code: GITHUB_SCOPE_INSUFFICIENT
                      message: 기여 repo 탐색은 GitHub OAuth 연동이 필요합니다.
                      retryable: false
                      fieldErrors: []
                    meta: *id001
  /github/contributions/save:
    post:
      tags:
      - GitHub
      summary: 기여 repo 저장
      description: 기여 탐색 목록에서 선택한 repo를 github_repositories에 저장한다. 이미 저장된 경우 기존 레코드를 그대로 반환한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveContributionRequest'
      responses:
        '201':
          description: 저장 성공 (또는 기존 레코드 반환)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Repository'
                  meta:
                    $ref: '#/components/schemas/Meta'
              examples:
                saveSuccess:
                  value:
                    success: true
                    data:
                      id: 42
                      githubRepoId: 111222
                      ownerLogin: spring-projects
                      repoName: spring-security
                      fullName: spring-projects/spring-security
                      htmlUrl: https://github.com/spring-projects/spring-security
                      visibility: public
                      defaultBranch: null
