openapi: 3.0.3
info:
  title: AI 기술 면접 연습 플랫폼 API
  version: 0.4.1
  description: 핵심 사용자 흐름과 최신 요구사항 변경안을 반영한 OpenAPI 계약. API 변경 시 docs/requirements.md,
    docs/project/open-items.md와 함께 수정한다. 핵심 성공 응답은 success/data/meta 형태와 예시 응답을 포함한다.
servers:
- url: /api/v1
tags:
- name: Auth
- name: GitHub
- name: Documents
- name: Applications
- name: Interview
components:
  securitySchemes:
    AuthorizationHeader:
      type: apiKey
      in: header
      name: Authorization
      description: '형식: Bearer {apiKey} {accessToken}'
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
        pagination:
          $ref: '#/components/schemas/Pagination'
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            retryable:
              type: boolean
            fieldErrors:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
          required:
          - code
          - message
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - success
      - error
      - meta
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        displayName:
          type: string
        email:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - active
          - withdrawn
      required:
      - id
      - displayName
      - status
    GithubConnection:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        githubUserId:
          type: integer
          format: int64
        githubLogin:
          type: string
        accessScope:
          type: string
          nullable: true
          description: OAuth 동의 범위. private repository 조회가 필요한 경우 추가 scope가 포함될 수
            있다.
        syncStatus:
          type: string
          enum:
          - pending
          - success
          - failed
        connectedAt:
          type: string
          format: date-time
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - userId
      - githubUserId
      - githubLogin
      - syncStatus
      - connectedAt
    Repository:
      type: object
      properties:
        id:
          type: integer
          format: int64
        githubRepoId:
          type: integer
          format: int64
        ownerLogin:
          type: string
        repoName:
          type: string
        fullName:
          type: string
        htmlUrl:
          type: string
        visibility:
          type: string
          enum:
          - public
          - private
          - internal
        defaultBranch:
          type: string
          nullable: true
        isSelected:
          type: boolean
      required:
      - id
      - githubRepoId
      - fullName
      - htmlUrl
      - visibility
      - isSelected
    SaveContributionRequest:
      type: object
      properties:
        githubRepoId:
          type: integer
          format: int64
        nameWithOwner:
          type: string
          description: 'owner/repo 형식'
          example: spring-projects/spring-security
        url:
          type: string
        language:
          type: string
          nullable: true
        repoSizeKb:
          type: integer
          nullable: true
      required:
      - githubRepoId
      - nameWithOwner
      - url
    AddContributionByUrlRequest:
      type: object
      properties:
        url:
          type: string
          description: 'GitHub repo URL (예: https://github.com/owner/repo)'
      required:
      - url
    ContributedRepo:
      type: object
      properties:
        githubRepoId:
          type: integer
          format: int64
        nameWithOwner:
          type: string
        url:
          type: string
        language:
          type: string
          nullable: true
        repoSizeKb:
          type: integer
          nullable: true
        contributionCount:
          type: integer
        alreadySaved:
          type: boolean
          description: 이미 github_repositories에 저장된 repo 여부
      required:
      - githubRepoId
      - nameWithOwner
      - url
      - contributionCount
      - alreadySaved
    Document:
      type: object
      properties:
        id:
          type: integer
          format: int64
        documentType:
          type: string
          enum:
          - resume
          - award
          - certificate
          - other
        originalFileName:
          type: string
        mimeType:
          type: string
          description: '허용 MIME type: application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document,
            text/markdown, text/plain'
        fileSizeBytes:
          type: integer
          format: int64
          description: 최대 52428800 bytes (50MB)
        extractStatus:
          type: string
          enum:
          - pending
          - success
          - failed
        uploadedAt:
          type: string
          format: date-time
        extractedAt:
          type: string
          format: date-time
          nullable: true
        extractedText:
          type: string
          nullable: true
      required:
      - id
      - documentType
      - originalFileName
      - mimeType
      - fileSizeBytes
      - extractStatus
      - uploadedAt
    Application:
      type: object
      properties:
        id:
          type: integer
          format: int64
        applicationTitle:
          type: string
          nullable: true
        companyName:
          type: string
          nullable: true
        jobRole:
          type: string
        status:
          type: string
          enum:
          - draft
          - ready
          description: 'draft: 작업 중, ready: jobRole, 1개 이상 source, 1개 이상 question, 모든 question의 유효 답변이 준비되어 면접 질문 생성과 이후 흐름에 사용할 수 있는 상태'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        applicationType:
          type: string
          nullable: true
          description: '지원 유형 예: 신입, 인턴, 경력'
      required:
      - id
      - jobRole
      - status
      - createdAt
      - updatedAt
    ApplicationQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionOrder:
          type: integer
        questionText:
          type: string
        generatedAnswer:
          type: string
          nullable: true
        editedAnswer:
          type: string
          nullable: true
        toneOption:
          type: string
          nullable: true
          enum:
          - formal
          - balanced
          - casual
        lengthOption:
          type: string
          nullable: true
          enum:
          - short
          - medium
          - long
          description: short<=700 chars, medium<=1200 chars, long<=1800 chars
        emphasisPoint:
          type: string
          nullable: true
      required:
      - id
      - questionOrder
      - questionText
    InterviewQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionOrder:
          type: integer
        questionType:
          type: string
          enum:
          - experience
          - project
          - technical_cs
          - technical_stack
          - behavioral
          - follow_up
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        questionText:
          type: string
        parentQuestionId:
          type: integer
          format: int64
          nullable: true
        sourceApplicationQuestionId:
          type: integer
          format: int64
          nullable: true
      required:
      - id
      - questionOrder
      - questionType
      - difficultyLevel
      - questionText
    InterviewSession:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionSetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ready
          - in_progress
          - paused
          - completed
          - feedback_completed
          description: 'ready: 시작 전, in_progress: 진행 중, paused: 일시중지, completed: 종료,
            feedback_completed: 피드백 완료'
        totalScore:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        summaryFeedback:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - questionSetId
      - status
    InterviewSessionCurrentQuestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionOrder:
          type: integer
        questionType:
          type: string
          enum:
          - experience
          - project
          - technical_cs
          - technical_stack
          - behavioral
          - follow_up
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        questionText:
          type: string
      required:
      - id
      - questionOrder
      - questionType
      - difficultyLevel
      - questionText
    InterviewSessionDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        questionSetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - ready
          - in_progress
          - paused
          - completed
          - feedback_completed
          description: 'ready: 시작 전, in_progress: 진행 중, paused: 일시중지, completed: 종료,
            feedback_completed: 피드백 완료'
        currentQuestion:
          allOf:
          - $ref: '#/components/schemas/InterviewSessionCurrentQuestion'
          nullable: true
        totalQuestionCount:
          type: integer
        answeredQuestionCount:
          type: integer
        remainingQuestionCount:
          type: integer
        resumeAvailable:
          type: boolean
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - questionSetId
      - status
      - totalQuestionCount
      - answeredQuestionCount
      - remainingQuestionCount
      - resumeAvailable
    InterviewSessionTransitionData:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - in_progress
          - paused
        updatedAt:
          type: string
          format: date-time
      required:
      - sessionId
      - status
      - updatedAt
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        reason:
          type: string
      required:
      - field
      - reason
    FeedbackTag:
      type: object
      properties:
        tagId:
          type: integer
          format: int64
        tagName:
          type: string
          enum:
          - 질문 의도 미충족
          - 답변 미완
          - 구체성 부족
          - 문제 해결 설명 부족
          - 답변 구조 미흡
          - 근거 부족
          - 기술 정확도 부족
          - 기술 깊이 부족
          - 선택 근거 부족
          - 표현 명확성 부족
        tagCategory:
          type: string
          enum:
          - content
          - structure
          - evidence
          - communication
          - technical
          - other
      required:
      - tagId
      - tagName
      - tagCategory
    InterviewAnswerResult:
      type: object
      properties:
        answerId:
          type: integer
          format: int64
        questionId:
          type: integer
          format: int64
        questionText:
          type: string
        answerText:
          type: string
          nullable: true
        score:
          type: integer
          minimum: 0
          maximum: 100
        evaluationRationale:
          type: string
        tags:
          type: array
          maxItems: 3
          items:
            $ref: '#/components/schemas/FeedbackTag'
      required:
      - answerId
      - questionId
      - questionText
      - score
      - evaluationRationale
      - tags
    InterviewResult:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        questionSetId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - completed
          - feedback_completed
        totalScore:
          type: integer
          minimum: 0
          maximum: 100
        summaryFeedback:
          type: string
        answers:
          type: array
          items:
            $ref: '#/components/schemas/InterviewAnswerResult'
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - sessionId
      - questionSetId
      - status
      - totalScore
      - summaryFeedback
      - answers
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1
      required:
      - page
      - size
      - totalElements
      - totalPages
    AuthorizationStartData:
      type: object
      properties:
        provider:
          type: string
          enum:
          - github
          - google
          - kakao
        authorizationUrl:
          type: string
        state:
          type: string
      required:
      - provider
      - authorizationUrl
      - state
    OAuthCallbackData:
      type: object
      properties:
        provider:
          type: string
          enum:
          - github
          - google
          - kakao
        isNewUser:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
      required:
      - provider
      - isNewUser
      - user
    LogoutData:
      type: object
      properties:
        loggedOut:
          type: boolean
          example: true
      required:
      - loggedOut
    RepositorySelectionData:
      type: object
      properties:
        selectedRepositoryIds:
          type: array
          items:
            type: integer
            format: int64
        selectedCount:
          type: integer
      required:
      - selectedRepositoryIds
      - selectedCount
    RepositorySyncData:
      type: object
      properties:
        repositoryId:
          type: integer
          format: int64
        syncStatus:
          type: string
          description: 동기화 시작 요청의 처리 상태. 저장되는 github_connections.sync_status(pending/success/failed)와는 별개다.
          enum:
          - queued
          - running
          - completed
          - failed
        queuedAt:
          type: string
          format: date-time
      required:
      - repositoryId
      - syncStatus
      - queuedAt
    RepoSyncStatus:
      type: object
      nullable: true
      properties:
        repositoryId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - PENDING
          - IN_PROGRESS
          - COMPLETED
          - SKIPPED
          - FAILED
          description: PENDING=대기중, IN_PROGRESS=처리중, COMPLETED=완료, SKIPPED=변경없음(significance check 미달), FAILED=오류
        step:
          type: string
          nullable: true
          description: IN_PROGRESS 시 현재 단계 (significance_check|clone|analysis|summary)
        startedAt:
          type: string
          format: date-time
          nullable: true
        estimatedEndAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
      required:
      - repositoryId
      - status
    ApplicationSourceBindingData:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        repositoryIds:
          type: array
          items:
            type: integer
            format: int64
        documentIds:
          type: array
          items:
            type: integer
            format: int64
        sourceCount:
          type: integer
      required:
      - applicationId
      - repositoryIds
      - documentIds
      - sourceCount
    GeneratedApplicationAnswer:
      type: object
      properties:
        questionId:
          type: integer
          format: int64
        questionText:
          type: string
        generatedAnswer:
          type: string
        toneOption:
          type: string
          nullable: true
          enum:
          - formal
          - balanced
          - casual
        lengthOption:
          type: string
          nullable: true
          enum:
          - short
          - medium
          - long
      required:
      - questionId
      - questionText
      - generatedAnswer
    ApplicationAnswerGenerationData:
      type: object
      properties:
        applicationId:
          type: integer
          format: int64
        generatedCount:
          type: integer
        regenerate:
          type: boolean
        answers:
          type: array
          items:
            $ref: '#/components/schemas/GeneratedApplicationAnswer'
      required:
      - applicationId
      - generatedCount
      - regenerate
      - answers
    InterviewQuestionSetSummary:
      type: object
      properties:
        questionSetId:
          type: integer
          format: int64
        applicationId:
          type: integer
          format: int64
        title:
          type: string
        questionCount:
          type: integer
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        createdAt:
          type: string
          format: date-time
      required:
      - questionSetId
      - applicationId
      - title
      - questionCount
      - difficultyLevel
      - createdAt
    InterviewQuestionSetDetail:
      type: object
      properties:
        questionSetId:
          type: integer
          format: int64
        applicationId:
          type: integer
          format: int64
        title:
          type: string
        questionCount:
          type: integer
        difficultyLevel:
          type: string
          enum:
          - easy
          - medium
          - hard
        questions:
          type: array
          items:
            $ref: '#/components/schemas/InterviewQuestion'
        createdAt:
          type: string
          format: date-time
      required:
      - questionSetId
      - applicationId
      - title
      - questionCount
      - difficultyLevel
      - questions
      - createdAt
    SessionAnswerSubmitData:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        questionId:
          type: integer
          format: int64
        answerOrder:
          type: integer
        isSkipped:
          type: boolean
        submittedAt:
          type: string
          format: date-time
      required:
      - sessionId
      - questionId
      - answerOrder
      - isSkipped
      - submittedAt
    SessionCompletionData:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        status:
          type: string
          enum:
          - completed
          - feedback_completed
        totalScore:
          type: integer
          minimum: 0
          maximum: 100
        summaryFeedback:
          type: string
        endedAt:
          type: string
          format: date-time
      required:
      - sessionId
      - status
      - totalScore
      - summaryFeedback
      - endedAt
security:
- AuthorizationHeader: []
paths:
  /auth/oauth2/{provider}/authorize:
    get:
      tags:
      - Auth
      summary: OAuth2 로그인 시작
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - github
          - google
          - kakao
      responses:
        '200':
          description: 인증 URL 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AuthorizationStartData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                authorizationStartExample:
                  value:
                    success: true
                    data:
                      provider: github
                      authorizationUrl: https://github.com/login/oauth/authorize?client_id=example&state=st_123
                      state: st_123
                    meta: &id001
                      requestId: req_20260317_0001
                      timestamp: '2026-03-17T10:30:00Z'
        '400':
          description: 지원하지 않는 provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidProvider:
                  value:
                    success: false
                    error:
                      code: AUTH_UNSUPPORTED_PROVIDER
                      message: 지원하지 않는 로그인 제공자입니다.
                      retryable: false
                    meta: *id001
  /auth/oauth2/{provider}/callback:
    get:
      tags:
      - Auth
      summary: OAuth2 콜백 처리
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          enum:
          - github
          - google
          - kakao
      - name: code
        in: query
        required: false
        schema:
          type: string
      - name: state
        in: query
        required: false
        schema:
          type: string
      - name: error
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/OAuthCallbackData'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                oauthCallbackSuccess:
                  value:
                    success: true
                    data:
                      provider: github
                      isNewUser: false
                      user:
                        id: 1
                        displayName: q q
                        email: user@example.com
                        profileImageUrl: https://avatars.githubusercontent.com/u/1?v=4
                        status: active
                    meta: *id001
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                oauthFailure:
                  value:
                    success: false
                    error:
                      code: AUTH_PROVIDER_RESPONSE_INVALID
                      message: 소셜 로그인 인증 처리에 실패했습니다.
                      retryable: false
                    meta: *id001
  /users/me:
    get:
      tags:
      - Auth
      summary: 내 정보 조회
      responses:
        '200':
          description: 내 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                userMeSuccess:
                  value:
                    success: true
                    data:
                      id: 1
                      displayName: q q
                      email: user@example.com
                      profileImageUrl: https://avatars.githubusercontent.com/u/1?v=4
                      status: active
                    meta: *id001
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                authRequired:
                  value:
                    success: false
                    error:
                      code: AUTH_REQUIRED
                      message: 로그인이 필요합니다.
                      retryable: false
                    meta: *id001
  /auth/logout:
    post:
