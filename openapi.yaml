          format: int64
      responses:
        '200':
          description: 세션 상세
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/InterviewSessionDetail'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - success
                - data
                - meta
              examples:
                sessionDetailSuccess:
                  value:
                    success: true
                    data:
                      id: 901
                      questionSetId: 701
                      status: paused
                      currentQuestion:
                        id: 802
                        questionOrder: 2
                        questionType: project
                        difficultyLevel: medium
                        questionText: 프로젝트에서 가장 어려웠던 장애 대응 경험을 설명해주세요.
                      completionFollowupContext: null
                      transcriptEntries:
                      - question:
                          id: 801
                          questionOrder: 1
                          questionType: experience
                          difficultyLevel: easy
                          questionText: 자기소개를 해주세요.
                        answer:
                          answerOrder: 1
                          answerText: 첫 번째 답변입니다.
                          isSkipped: false
                      totalQuestionCount: 5
                      answeredQuestionCount: 1
                      remainingQuestionCount: 4
                      resumeAvailable: true
                      lastActivityAt: '2026-03-17T10:36:00Z'
                      startedAt: '2026-03-17T10:35:00Z'
                      endedAt: null
                    meta: *id001
        '404':
          description: 세션을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionDetailNotFound:
                  value:
                    success: false
                    error:
                      code: RESOURCE_NOT_FOUND
                      message: 세션을 찾을 수 없습니다.
                      retryable: false
                    meta: *id001
      description: 세션 복원 화면이 한 번의 조회로 그려질 수 있도록 현재 질문, 진행률, 남은 질문 수, resume 가능 여부, 마지막 활동 시각을 함께 반환한다.
        currentQuestion.id는 세션 질문 id이며, 현재 질문은 답변이 없는 세션 질문 중 가장 작은 questionOrder로 계산한다.
        transcriptEntries는 answered question/answer pair만 answerOrder 오름차순으로 포함하며, 현재 미응답 currentQuestion과 system 메시지는 포함하지 않는다.
        답변 저장 직후 재조회에서는 pending 답변을 로컬 follow-up rule로 먼저 해석한다. `USE_CANDIDATE`면
        `candidateQuestionTypes` 우선순위 기준의 로컬 deterministic follow-up 1개를 즉시 검토한다. `USE_DYNAMIC`이면 runtime
        dynamic follow-up AI 생성을 best-effort로 시도하며, 이 즉시 AI 생성은 세션당 최대 1회만 허용한다. 같은 부모 답변에는 최대
        1개만 확정한다. `NO_FOLLOW_UP`, candidate 템플릿 미선정/미생성, follow-up 생성 null/실패는 세션을 멈추지 않으며 다음 기본
        질문을 currentQuestion으로 반환한다. completion follow-up이 현재 질문이면 `completionFollowupContext`에 root Q/A, runtime
        follow-up Q/A, 현재 completion follow-up 질문을 함께 내려 프론트가 같은 세션 화면 안에서 문맥 카드를 그릴 수 있게 한다.
        v1 자동 일시정지는 이 조회 요청 진입 시점에도 `lastActivityAt` 기준으로 평가하며, 30분 초과 상태의 `in_progress` 세션은
        `paused`로 정규화한다.
