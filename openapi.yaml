                      - field: remainingQuestionCount
                        reason: incomplete
                    meta: *id001
        '404':
          description: 세션을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionCompleteNotFound:
                  value:
                    success: false
                    error:
                      code: RESOURCE_NOT_FOUND
                      message: 세션을 찾을 수 없습니다.
                      retryable: false
                    meta: *id001
        '409':
          description: 이미 종료된 세션에 다시 종료 요청함
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                sessionCompleteAlreadyCompleted:
                  value:
                    success: false
                    error:
                      code: INTERVIEW_SESSION_ALREADY_COMPLETED
                      message: 이미 종료된 면접 세션입니다.
                      retryable: false
                    meta: *id001
        '502':
          description: 면접 결과 생성 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                aiSchemaError:
                  value:
                    success: false
                    error:
                      code: INTERVIEW_RESULT_INCOMPLETE
                      message: 면접 결과 생성 결과가 완전하지 않습니다.
                      retryable: true
                    meta: *id001
        '503':
          description: 면접 결과 생성 timeout 또는 일시 장애
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                aiTimeoutError:
                  value:
                    success: false
                    error:
                      code: EXTERNAL_SERVICE_TEMPORARILY_UNAVAILABLE
                      message: 외부 서비스가 일시적으로 불안정합니다. 잠시 후 다시 시도해주세요.
                      retryable: true
                    meta: *id001
      description: 세션을 종료하고 피드백 결과 생성을 시작한다. 피드백이 즉시 생성되면 feedback_completed 상태로 응답할
        수 있다. `complete`는 `in_progress`, `paused` 상태에서만 허용하며, 미답변 질문이 남아 있으면 400을 반환한다.
        결과 생성 전에 answered root thread 전체를 기준으로 마지막 follow-up 보완 1회를 best-effort로 검토할 수 있다.
        각 thread는 기본 질문/답변과, 이미 존재하면 runtime follow-up 질문/답변까지 함께 본다. 이 마지막 보완은 runtime
        `finalAction`을 hard gate로 쓰지 않으므로 runtime `NO_FOLLOW_UP` 답변이나 runtime follow-up이 이미 있던 thread도
        검토 대상이 될 수 있다. 추가 follow-up이 생성되면 선택된 thread들의 마지막 질문 뒤에 세션 질문으로 이어 붙이고, 세션은
        종료하지 않고 기존 `remainingQuestionCount=incomplete` 400 응답을 반환한다. 프론트는 이 400을 받은 뒤 `GET /interview/sessions/{sessionId}`
        를 다시 호출해 `currentQuestion`과 `completionFollowupContext`를 기준으로 같은 세션 화면 안에서 마지막 보완 질문을 이어서 보여준다.
        마지막 보완이 빈 배열 또는 실패여도 완료 흐름은 계속 진행한다. 답변된 follow-up은 일반 세션 질문과 동일하게 미답변 검증과 결과 생성 입력에 포함한다.
