version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: local-nginx
    ports:
      - "80:80"
    volumes:
      # 로컬 전용 Nginx 설정 마운트
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  db:
    image: postgres:15-alpine
    container_name: local-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - local-db-data:/var/lib/postgresql/data
      - ./docker/db.init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: local-prometheus
    volumes:
      # 로컬 전용 Prometheus 설정 마운트
      - ./docker/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: local-grafana
    ports:
      - "3001:3000" # 로컬 프론트엔드(3000)와 겹치지 않게 3001로 오픈
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

volumes:
  local-db-data:
