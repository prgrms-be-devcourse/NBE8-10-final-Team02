name: OCI Blue/Green Deploy (FE & BE)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
  workflow_dispatch: # 수동 배포 버튼

env:
  REGISTRY: ghcr.io
  # 이미지 이름 설정
  IMAGE_BE: ${{ github.repository }}-backend
  IMAGE_FE: ${{ github.repository }}-frontend
  # 슬롯 설정 (고정)
  BE_SLOT_1: be_a
  BE_SLOT_2: be_b
  FE_SLOT_1: fe_a
  FE_SLOT_2: fe_b

  # 포트 설정
  BE_PORT: 8080
  FE_PORT: 3000

  NGINX_CONF: /home/ubuntu/my-project/docker/npm/data/nginx/custom/upstreams.conf

jobs:
  calculate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.dry_run.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate next tag
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

  build-and-push:
    needs: calculate-tag
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> "${GITHUB_ENV}"
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          BE_IMAGE_PATH=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_BE }}" | tr '[:upper:]' '[:lower:]')
          FE_IMAGE_PATH=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_FE }}" | tr '[:upper:]' '[:lower:]')
          TAG_NAME="${{ needs.calculate-tag.outputs.tag_name }}"
          
          # Backend 빌드 ( --context 삭제 )
          docker buildx build --push \
            --platform linux/arm64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${BE_IMAGE_PATH}:${TAG_NAME} \
            --tag ${BE_IMAGE_PATH}:latest \
            ./backend
          
          # Frontend 빌드 ( --context 삭제 )
          docker buildx build --push \
            --platform linux/arm64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${FE_IMAGE_PATH}:${TAG_NAME} \
            --tag ${FE_IMAGE_PATH}:latest \
            ./frontend

  # 3. Oracle Cloud SSH 배포 (Blue/Green)
  deploy:
    needs: [ calculate-tag, build-and-push ]
    runs-on: ubuntu-latest
    steps:
      - name: Blue-Green Switch via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.calculate-tag.outputs.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_LC: ${{ github.repository_owner }}
          NGINX_CONF: ${{ env.NGINX_CONF }}
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG, GITHUB_TOKEN, OWNER_LC,NGINX_CONF
          script: |
            set -e
            
            # --- 1. 변수 설정 ---
            BE_DOMAIN="api.blog.jsh505.site"
            FE_DOMAIN="www.blog.jsh505.site"
            BE_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend"
            FE_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend"
            
            # --- 2. Blue/Green 판정 ---
            if docker ps --format '{{.Names}}' | grep -q "be_a"; then
              BLUE_BE="be_a"; GREEN_BE="be_b"; BLUE_FE="fe_a"; GREEN_FE="fe_b"
            else
              BLUE_BE="be_b"; GREEN_BE="be_a"; BLUE_FE="fe_b"; GREEN_FE="fe_a"
            fi
            echo "🎨 Role -> Blue(now): $BLUE_BE, Green(next): $GREEN_BE"

            # --- 3. 새 이미지 Pull 및 기동 ---
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "${BE_IMAGE}:${IMAGE_TAG}"
            docker pull "${FE_IMAGE}:${IMAGE_TAG}"
            
            docker rm -f $GREEN_BE $GREEN_FE >/dev/null 2>&1 || true
            docker run -d --name $GREEN_BE --network global-net -e SPRING_PROFILES_ACTIVE=prod "${BE_IMAGE}:${IMAGE_TAG}"
            docker run -d --name $GREEN_FE --network global-net "${FE_IMAGE}:${IMAGE_TAG}"

            # --- 4. 헬스 체크 ---
            echo "⏱ Waiting for Green to be healthy..."
            sleep 20 # 앱이 완전히 켜질 시간 대기 (필요시 늘리세요)

            # --- 5. NPM API 로그인 (토큰 발급) ---
            TOKEN=$(curl -s -X POST "http://localhost:81/api/tokens" \
              -H "Content-Type: application/json" \
              -d "{\"identity\": \"${NPM_EMAIL}\", \"secret\": \"${NPM_PASSWORD}\"}" | jq -r .token)
            
            [[ -z "$TOKEN" || "$TOKEN" == "null" ]] && { echo "❌ NPM Login Failed"; exit 1; }

            # --- 6. NPM API: 백엔드 타겟 변경 ---
            echo "🔄 Updating NPM Proxy for Backend..."
            BE_ID=$(curl -s -H "Authorization: Bearer $TOKEN" "http://localhost:81/api/nginx/proxy-hosts" | jq -r ".[] | select(.domain_names[] == \"$BE_DOMAIN\") | .id")
            BE_CFG=$(curl -s -H "Authorization: Bearer $TOKEN" "http://localhost:81/api/nginx/proxy-hosts/$BE_ID")
            
            # 기존 설정에서 forward_host만 GREEN 컨테이너 이름으로 덮어씀 (불필요한 메타데이터 제거)
            NEW_BE_CFG=$(echo "$BE_CFG" | jq --arg host "$GREEN_BE" '{domain_names, forward_scheme, forward_host: $host, forward_port, access_list_id, certificate_id, ssl_forced, caching_enabled, block_exploits, allow_websocket_upgrade, advanced_config, locations, meta}')
            
            curl -s -o /dev/null -X PUT -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "$NEW_BE_CFG" "http://localhost:81/api/nginx/proxy-hosts/$BE_ID"

            # --- 7. NPM API: 프론트엔드 타겟 변경 ---
            echo "🔄 Updating NPM Proxy for Frontend..."
            FE_ID=$(curl -s -H "Authorization: Bearer $TOKEN" "http://localhost:81/api/nginx/proxy-hosts" | jq -r ".[] | select(.domain_names[] == \"$FE_DOMAIN\") | .id")
            FE_CFG=$(curl -s -H "Authorization: Bearer $TOKEN" "http://localhost:81/api/nginx/proxy-hosts/$FE_ID")
            
            NEW_FE_CFG=$(echo "$FE_CFG" | jq --arg host "$GREEN_FE" '{domain_names, forward_scheme, forward_host: $host, forward_port, access_list_id, certificate_id, ssl_forced, caching_enabled, block_exploits, allow_websocket_upgrade, advanced_config, locations, meta}')
            
            curl -s -o /dev/null -X PUT -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "$NEW_FE_CFG" "http://localhost:81/api/nginx/proxy-hosts/$FE_ID"

            echo "✅ NPM API Update Complete! Traffic switched."

            # --- 8. 이전 Blue 제거 ---
            if docker ps --format '{{.Names}}' | grep -q "$BLUE_BE"; then
              docker stop $BLUE_BE $BLUE_FE >/dev/null 2>&1 || true
              docker rm $BLUE_BE $BLUE_FE >/dev/null 2>&1 || true
              echo "🧹 Removed old Blue: $BLUE_BE, $BLUE_FE"
            fi
            
            docker image prune -f

  # 4. 성공 시 태그/릴리즈 생성
  make-tag-and-release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-tag.outputs.tag_name }}
          name: Release ${{ needs.calculate-tag.outputs.tag_name }}