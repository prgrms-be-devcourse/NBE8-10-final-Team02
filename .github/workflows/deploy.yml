name: OCI Blue/Green Deploy (FE & BE)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
  workflow_dispatch: # 수동 배포 버튼

env:
  REGISTRY: ghcr.io
  # 이미지 이름 설정
  IMAGE_BE: ${{ github.repository }}-backend
  IMAGE_FE: ${{ github.repository }}-frontend
  # 슬롯 설정 (고정)
  BE_SLOT_1: be_a
  BE_SLOT_2: be_b
  FE_SLOT_1: fe_a
  FE_SLOT_2: fe_b

  # 포트 설정
  BE_PORT: 8080
  FE_PORT: 3000

  NGINX_CONF: /home/ubuntu/my-project/docker/nginx/prod.conf

jobs:
  calculate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.dry_run.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate next tag
        id: dry_run
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

  build-and-push:
    needs: calculate-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >> "${GITHUB_ENV}"
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          BE_IMAGE_PATH=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_BE }}" | tr '[:upper:]' '[:lower:]')
          FE_IMAGE_PATH=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_FE }}" | tr '[:upper:]' '[:lower:]')
          TAG_NAME="${{ needs.calculate-tag.outputs.tag_name }}"
          
          # Backend 빌드 ( --context 삭제 )
          docker buildx build --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${BE_IMAGE_PATH}:${TAG_NAME} \
            --tag ${BE_IMAGE_PATH}:latest \
            ./backend  # 폴더 경로를 맨 뒤에!
          
          # Frontend 빌드 ( --context 삭제 )
          docker buildx build --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${FE_IMAGE_PATH}:${TAG_NAME} \
            --tag ${FE_IMAGE_PATH}:latest \
            ./frontend # 폴더 경로를 맨 뒤에!

  # 3. Oracle Cloud SSH 배포 (Blue/Green)
  deploy:
    needs: [ calculate-tag, build-and-push ]
    runs-on: ubuntu-latest
    steps:
      - name: Blue-Green Switch via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.calculate-tag.outputs.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_LC: ${{ github.repository_owner }}
          NGINX_CONF: ${{ env.NGINX_CONF }}
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG, GITHUB_TOKEN, OWNER_LC,NGINX_CONF
          script: |
            set -e
            OWNER_LC_FINAL=$(echo "${OWNER_LC}" | tr '[:upper:]' '[:lower:]')
            BE_IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend" | tr '[:upper:]' '[:lower:]')
            FE_IMAGE_NAME=$(echo "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend" | tr '[:upper:]' '[:lower:]')
  
            # 1. 현재 어떤 슬롯이 돌고 있는지 확인 (이름으로 판단)
            # 만약 수동 배포 상태(prod-spring-app)라면 be_a를 Green으로 설정
            if docker ps --format '{{.Names}}' | grep -q "be_a"; then
              BLUE_BE="be_a"; GREEN_BE="be_b"; BLUE_FE="fe_a"; GREEN_FE="fe_b"
            elif docker ps --format '{{.Names}}' | grep -q "be_b"; then
              BLUE_BE="be_b"; GREEN_BE="be_a"; BLUE_FE="fe_b"; GREEN_FE="fe_a"
            else
              BLUE_BE="prod-spring-app"; BLUE_FE="prod-next-app"; GREEN_BE="be_a"; GREEN_FE="fe_a"
            fi
            
            echo "🔵 Blue: $BLUE_BE | 🟢 Green: $GREEN_BE"
            
            # 2. GHCR 로그인 및 새 이미지 Pull
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "${BE_IMAGE_NAME}:${IMAGE_TAG}"
            docker pull "${FE_IMAGE_NAME}:${IMAGE_TAG}"
            
            # 3. Green 컨테이너 기동
            docker rm -f $GREEN_BE $GREEN_FE || true
            docker run -d --name $GREEN_BE --network global-net -e SPRING_PROFILES_ACTIVE=prod \
            "${BE_IMAGE_NAME}:${IMAGE_TAG}"
            docker run -d --name $GREEN_FE --network global-net \
            "${FE_IMAGE_NAME}:${IMAGE_TAG}"
            
            # 4. 헬스 체크 (Green이 살았는지 확인)
            echo "⏱ Waiting for Green to be healthy..."
            sleep 20 # 앱 구동 시간 확보
            
            # 5. Nginx 설정 파일 업데이트 및 Reload (핵심!)
            # sed 명령어를 써서 기존 Blue 이름을 Green 이름으로 교체합니다.
            sed -i "s/$BLUE_BE/$GREEN_BE/g" ${{ env.NGINX_CONF }}
            sed -i "s/$BLUE_FE/$GREEN_FE/g" ${{ env.NGINX_CONF }}
            
            docker exec prod-nginx nginx -s reload
            echo "✅ Nginx Reloaded! Traffic switched to $GREEN_BE"
            
            # 6. 이전 Blue 제거
            docker stop $BLUE_BE $BLUE_FE || true
            docker rm $BLUE_BE $BLUE_FE || true
            docker image prune -f

  # 4. 성공 시 태그/릴리즈 생성
  make-tag-and-release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-tag.outputs.tag_name }}
          name: Release ${{ needs.calculate-tag.outputs.tag_name }}