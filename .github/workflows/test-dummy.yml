# backend/** 경로가 아닌 파일이 수정되었을 때 무조건 성공(Exit 0)을 반환하는 워크플로우
name: Test # 기존 워크플로우와 반드시 동일한 이름이어야 함
on:
  pull_request:
    branches: [ main, dev ]
    paths-ignore:
      - "backend/**"
  push:
    branches: [ dev ]
    paths-ignore:
      - "backend/**"

jobs:
  test: # Job 이름도 동일해야 함
    runs-on: ubuntu-latest
    steps:
      - run: echo "백엔드 코드가 변경되지 않아 테스트를 건너뛰고 성공 처리합니다."
