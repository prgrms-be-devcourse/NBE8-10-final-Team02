name: Test

on:
  pull_request:
    branches: [ main, dev ]
    paths:
      - "backend/**"
  push:
    branches: [ dev ]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Cache Testcontainers layers
        uses: actions/cache@v4
        with:
          path: ~/.testcontainers
          key: testcontainers-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            testcontainers-${{ runner.os }}-

      - name: Run tests
        working-directory: ./backend
        run: ./gradlew test

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-report
          path: backend/build/reports/tests/