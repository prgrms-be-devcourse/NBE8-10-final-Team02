version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prod-prometheus
    volumes:
      - ./docker/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - global-net
    deploy: { resources: { limits: { memory: 512M } } }
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: prod-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - global-net
    depends_on:
      - prometheus
    deploy: { resources: { limits: { memory: 256M } } }
    restart: always

networks:
  global-net:
    external: true

volumes:
  prometheus_data:
  grafana_data: